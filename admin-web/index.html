<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>axzen Infotech Admin</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --page: #f5f5f7;
      --panel: #ffffff;
      --navy: #101828;
      --blue: #007aff;
      --blue-2: #0f62fe;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --purple: #8b5cf6;
      --cyan: #06b6d4;
      --shadow: 0 10px 28px #1118270d;
      --soft-shadow: 0 6px 16px #1118270a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #fbfcff 0%, #f6f8fb 48%, #eef2f7 100%);
      color: var(--ink);
      font-family: "Segoe UI Variable", "Segoe UI", "Noto Sans", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(160deg, #f9fafb, #eef4fb 55%, #f8fafc);
    }

    .login-card {
      width: min(420px, 100%);
      display: grid;
      gap: 16px;
      border: 1px solid #ffffff;
      border-radius: 24px;
      background: #ffffffd9;
      padding: 30px;
      box-shadow: 0 24px 70px #11182717;
      backdrop-filter: blur(22px);
    }

    .brand-lockup { text-align: center; margin-bottom: 10px; }
    .powered { margin: 0 0 4px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }
    .brand-name { margin: 0; font-size: 50px; line-height: .94; letter-spacing: 0; }
    .tagline { margin: 8px 0 0; color: var(--blue); font-size: 15px; font-weight: 900; text-transform: uppercase; }

    label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 900; text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #dfe3eb;
      border-radius: 12px;
      padding: 12px 13px;
      background: #fbfcff;
      color: var(--ink);
      outline: none;
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 4px #007aff1c; background: white; }

    .primary, .secondary, .danger, .ghost {
      min-height: 42px;
      border-radius: 8px;
      border: 0;
      padding: 0 14px;
      font-weight: 700;
    }
    .primary { background: linear-gradient(180deg, #1684ff, #006de8); color: white; box-shadow: 0 12px 28px #007aff33; }
    .secondary { background: #f2f7ff; color: var(--blue); border: 1px solid #d7e8ff; }
    .danger { background: #fff5f5; color: var(--red); border: 1px solid #ffd9d9; }
    .ghost { background: white; color: var(--ink); border: 1px solid var(--line); }
    .status { min-height: 20px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    .shell { display: grid; grid-template-columns: 276px 1fr; min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 24px 18px;
      background: linear-gradient(180deg, #111827, #172033 55%, #101828);
      color: white;
      border-right: 1px solid #ffffff12;
    }

    .side-brand strong { display: block; font-size: 22px; letter-spacing: 0; }
    .side-brand span, .profile span { color: #b8c2d6; font-size: 13px; }
    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid #ffffff16;
      border-radius: 18px;
      background: #ffffff0d;
    }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: linear-gradient(180deg, #ffffff, #e8eef8); color: var(--navy); font-weight: 900; box-shadow: inset 0 -1px 0 #0001; }

    nav { display: grid; gap: 6px; }
    nav button {
      min-height: 44px;
      border: 0;
      border-radius: 13px;
      background: transparent;
      color: #d7deea;
      text-align: left;
      padding: 0 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    nav button:hover { background: #ffffff10; }
    nav button.active { background: linear-gradient(180deg, #1684ff, #006de8); color: white; box-shadow: 0 12px 28px #007aff40; }
    .logout { margin-top: auto; color: #ffb4b4; background: #ffffff10; border: 1px solid #ffffff14; min-height: 42px; border-radius: 13px; font-weight: 900; }

    main { padding: 26px; min-width: 0; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: -26px -26px 20px;
      padding: 22px 26px;
      background: #f9fafbcc;
      border-bottom: 1px solid #e8edf4;
      backdrop-filter: blur(20px);
    }
    .topbar h1 { margin: 0; font-size: 30px; letter-spacing: 0; }
    .topbar p { margin: 5px 0 0; color: var(--muted); font-size: 13px; font-weight: 800; }
    .top-actions { display: flex; gap: 10px; align-items: center; }
    .chip { border: 1px solid #e5e9f0; border-radius: 12px; background: #ffffffd9; padding: 11px 13px; font-size: 13px; font-weight: 900; box-shadow: var(--soft-shadow); }

    .panel, .card, .workflow {
      border: 1px solid #e8edf4;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }
    .panel { padding: 18px; min-width: 0; }
    .panel h2, .workflow h2 { margin: 0 0 16px; font-size: 16px; letter-spacing: 0; }

    .workflow { padding: 18px; margin-bottom: 16px; }
    .flow-grid { display: grid; grid-template-columns: repeat(8, minmax(96px, 1fr)); gap: 12px; }
    .flow-step { display: grid; gap: 9px; justify-items: center; text-align: center; font-size: 12px; font-weight: 850; color: #374151; }
    .flow-icon { width: 44px; height: 44px; border-radius: 14px; display: grid; place-items: center; background: linear-gradient(180deg, #f7fbff, #e8f2ff); color: var(--blue); border: 1px solid #d9eaff; font-weight: 900; box-shadow: inset 0 1px 0 #fff; }

    .kpis { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 14px; margin-bottom: 16px; }
    .card { position: relative; overflow: hidden; padding: 18px; min-height: 118px; background: linear-gradient(145deg, #ffffff, #fafcff); }
    .card::after { content: ""; position: absolute; right: -32px; bottom: -34px; width: 96px; height: 96px; border-radius: 50%; background: #0f62fe0b; }
    .card.blue { background: linear-gradient(145deg, #eef7ff, #ffffff); }
    .card.green { background: linear-gradient(145deg, #effdf5, #ffffff); }
    .card.orange { background: linear-gradient(145deg, #fff8eb, #ffffff); }
    .card.red { background: linear-gradient(145deg, #fff4f4, #ffffff); }
    .card span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .card strong { display: block; margin-top: 10px; font-size: 26px; letter-spacing: 0; }
    .card small { display: block; margin-top: 12px; color: var(--green); font-weight: 900; }

    .grid-2 { display: grid; grid-template-columns: minmax(0, 1.35fr) minmax(320px, .65fr); gap: 16px; margin-bottom: 16px; }
    .grid-2-even { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-bottom: 16px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .grid-6 { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }

    .chart { height: 220px; display: grid; align-items: end; grid-template-columns: repeat(7, 1fr); gap: 10px; padding: 14px 4px 0; }
    .bar { border-radius: 12px 12px 0 0; background: linear-gradient(180deg, #1684ff, #cfe4ff); min-height: 22px; box-shadow: inset 0 1px 0 #fff8; }
    .donut { width: 176px; height: 176px; border-radius: 50%; margin: 10px auto; background: conic-gradient(var(--blue) 0 55%, var(--green) 55% 88%, var(--orange) 88% 100%); display: grid; place-items: center; }
    .donut span { width: 102px; height: 102px; border-radius: 50%; background: white; display: grid; place-items: center; text-align: center; font-weight: 900; }
    .donut.small { width: 148px; height: 148px; margin: 0; }
    .donut.small span { width: 86px; height: 86px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; font-weight: 500; }
    th { color: var(--muted); text-align: left; font-size: 12px; padding: 11px 10px; border-bottom: 1px solid var(--line); background: #fafbfc; }
    td { padding: 12px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
    tbody tr:hover { background: #fbfcff; }
    tr:last-child td { border-bottom: 0; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .table-wrap { width: 100%; overflow: auto; }
    .list { display: grid; gap: 10px; }
    .list-row { display: flex; justify-content: space-between; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--line); font-size: 13px; }
    .list-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .muted { color: var(--muted); font-weight: 600; }
    .pill { display: inline-flex; align-items: center; min-height: 25px; border-radius: 999px; padding: 0 9px; background: #eef4ff; color: var(--blue); font-size: 12px; font-weight: 900; }
    .pill.red { background: #fff1f3; color: var(--red); }
    .pill.green { background: #ecfdf3; color: var(--green); }
    .pill.orange { background: #fff7ed; color: #ea580c; }
    .pill.gray { background: #f3f4f6; color: #4b5563; }

    .form-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 10px; align-items: end; }
    .settings-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; align-items: end; }
    .section-gap { display: grid; gap: 16px; }
    .toolbar { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search { width: min(360px, 100%); }
    .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
    .catalog-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; display: grid; gap: 8px; background: #fbfcff; }
    .catalog-img { width: 100%; aspect-ratio: 16 / 10; border-radius: 6px; background: #edf2f7 center / cover; }
    .catalog-controls { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: center; }
    .catalog-controls input[type="checkbox"] { width: 18px; height: 18px; }
    .mini-form { display: grid; grid-template-columns: 1fr 92px auto; gap: 8px; align-items: end; }
    .modal-backdrop { position: fixed; inset: 0; z-index: 20; display: grid; place-items: center; padding: 18px; background: #11182766; backdrop-filter: blur(8px); }
    .modal { width: min(620px, 100%); border-radius: 10px; border: 1px solid #e5e7eb; background: white; box-shadow: 0 24px 80px #11182740; }
    .modal-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; padding: 18px; border-bottom: 1px solid var(--line); }
    .modal-head h2 { margin: 0; font-size: 18px; }
    .modal-body { padding: 18px; display: grid; gap: 12px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 0 18px 18px; }
    .item-thumb { width: 54px; height: 42px; border-radius: 6px; object-fit: cover; background: #eef2f7; }
    .name-cell { display: flex; gap: 10px; align-items: center; min-width: 190px; }
    .report-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-btn { min-height: 38px; border: 1px solid var(--line); border-radius: 8px; padding: 0 14px; background: white; color: var(--ink); font-weight: 850; }
    .filter-btn.active { background: var(--blue-2); border-color: var(--blue-2); color: white; }
    .date-range { display: none; gap: 8px; align-items: center; flex-wrap: wrap; }
    .date-range.active { display: flex; }
    .report-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    .metric-card { min-height: 132px; display: grid; align-content: space-between; }
    .metric-card .metric-icon { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center; background: #eef4ff; color: var(--blue); font-weight: 950; }
    .metric-card .metric-row { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
    .metric-card strong { font-size: 24px; }
    .progress { height: 8px; border-radius: 999px; background: #eef2f7; overflow: hidden; }
    .progress span { display: block; height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); }
    .chart-line { height: 190px; display: grid; align-items: end; grid-template-columns: repeat(8, 1fr); gap: 10px; border-left: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 10px 0 0 10px; }
    .chart-line .point { min-height: 8px; border-radius: 10px 10px 0 0; background: linear-gradient(180deg, #2563eb, #bfdbfe); }
    .quick-actions { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 12px; }
    .quick-action { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 14px; display: grid; gap: 4px; }

    .phone-preview { border: 9px solid #101010; border-radius: 30px; padding: 14px; background: #fbfcff; box-shadow: 0 18px 45px #0003; }
    .phone-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-weight: 900; }
    .phone-tabs { display: flex; gap: 6px; margin-bottom: 10px; overflow: hidden; }
    .phone-tabs span { border-radius: 10px; background: #edf3ff; padding: 7px 9px; color: var(--blue); font-size: 11px; font-weight: 900; }
    .phone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .phone-item { border: 1px solid var(--line); border-radius: 12px; padding: 10px 6px; text-align: center; font-size: 11px; font-weight: 900; background: white; }
    .wa-card { background: #eefbea; border: 1px solid #c7efca; border-radius: 14px; padding: 14px; font-size: 13px; line-height: 1.65; }

    @media (max-width: 1200px) {
      .shell { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; }
      .flow-grid, .kpis, .grid-2, .grid-2-even, .grid-3, .grid-4, .grid-6, .form-grid, .settings-grid, .quick-actions { grid-template-columns: 1fr; }
    }

    @media print {
      aside, .topbar, .report-filters, .report-actions, #pageStatus { display: none !important; }
      .shell { display: block; }
      main { padding: 0; }
      body { background: white; }
      .panel, .card { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <section class="login" id="loginView">
    <form class="login-card" id="loginForm">
      <div class="brand-lockup">
        <p class="powered">Powered by</p>
        <h1 class="brand-name">axzen</h1>
        <p class="tagline">Infotech</p>
      </div>
      <label>Mobile number <input id="mobileInput" required></label>
      <label>Password <input id="passwordInput" type="password" required></label>
      <button class="primary">Login</button>
      <div class="status" id="loginStatus">Admin default: admin / 1234</div>
    </form>
  </section>

  <section class="shell hidden" id="appView">
    <aside>
      <div class="side-brand"><strong>axzen Infotech</strong><span id="sideCanteen">Admin Panel</span></div>
      <div class="profile"><div class="avatar">A</div><div><strong id="profileName">Admin</strong><br><span>Super Admin</span></div></div>
      <nav>
        <button class="active" data-tab="dashboard">Dashboard</button>
        <button data-tab="sales">Sales</button>
        <button data-tab="menu">Menu Management</button>
        <button data-tab="stock">Inventory / Stock</button>
        <button data-tab="finance">Finance</button>
        <button data-tab="users">Users</button>
        <button data-tab="reports">Reports</button>
        <button data-tab="whatsapp">WhatsApp Reports</button>
        <button data-tab="settings">Settings</button>
      </nav>
      <button class="logout" id="logoutBtn">Logout</button>
    </aside>
    <main>
      <header class="topbar">
        <div><h1 id="pageTitle">Dashboard</h1><p>Home / <span id="crumb">Dashboard</span></p></div>
        <div class="top-actions">
          <div class="chip" id="dateChip"></div>
          <div class="chip" id="canteenChip">Main Canteen</div>
        </div>
      </header>
      <section id="page"></section>
      <div class="status" id="pageStatus"></div>
    </main>
  </section>

  <script>
    const isLocalHost = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
    const apiHost = isLocalHost ? "localhost" : window.location.hostname;
    const API = window.location.protocol === "https:" ? window.location.origin : `http://${apiHost}:5000`;
    let session = JSON.parse(localStorage.getItem("AXEN_ADMIN_SESSION") || "null");
    let settings = { canteenName: "Main Canteen", brandName: "axzen", tagline: "Infotech", reportTime: "22:00", adminWhatsAppNumber: "", autoReport: false, reportType: "daily" };
    let dashboard = emptyDashboard();
    let whatsappLogs = [];
    let whatsappStatus = {};
    let defaultProducts = [];
    let tab = "dashboard";
    let menuSearch = "";
    let reportFilter = "today";
    let customFrom = "";
    let customTo = "";
    const $ = id => document.getElementById(id);
    const money = value => "Rs " + Number(value || 0).toFixed(0);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));

    function emptyDashboard() {
      return { totalSales: 0, totalBills: 0, cash: 0, upi: 0, card: 0, online: 0, totalExpenses: 0, netCollection: 0, topItems: [], userSales: [], lowStock: [], stock: [], expenses: [], products: [], users: [], orders: [] };
    }

    async function api(path, options = {}) {
      const token = localStorage.getItem("AXEN_ADMIN_TOKEN");
      const response = await fetch(API + path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {})
        }
      });
      if (!response.ok) {
        const text = await response.text();
        let message = text;
        try {
          const data = JSON.parse(text);
          message = data.message || text;
        } catch {}
        throw new Error(message);
      }
      return response.json();
    }

    function pageMessage(text, type = "ok") {
      $("pageStatus").textContent = text || "";
      $("pageStatus").className = "status " + type;
    }

    function applySettings(next = {}) {
      settings = { ...settings, ...next };
      $("sideCanteen").textContent = settings.canteenName;
      $("canteenChip").textContent = settings.canteenName;
    }

    async function loadData() {
      try { applySettings(await api("/settings")); } catch {}
      try { dashboard = { ...emptyDashboard(), ...(await api("/dashboard")) }; } catch { pageMessage("Server data load failed", "error"); }
      try { whatsappLogs = await api("/whatsapp/logs"); } catch { whatsappLogs = []; }
      try { whatsappStatus = await api("/whatsapp/status"); } catch { whatsappStatus = {}; }
      try { defaultProducts = await api("/catalog/default-products"); } catch { defaultProducts = []; }
      render();
    }

    function showApp() {
      $("loginView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("profileName").textContent = session.name;
      loadData();
    }

    function render() {
      document.querySelectorAll("[data-tab]").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
      const titles = { dashboard: "Dashboard", sales: "Sales", menu: "Menu Management", stock: "Inventory / Stock", finance: "Finance", users: "Users", reports: "Reports", whatsapp: "WhatsApp Reports", settings: "Settings" };
      $("pageTitle").textContent = titles[tab] || "Dashboard";
      $("crumb").textContent = $("pageTitle").textContent;
      $("dateChip").textContent = new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
      const renderers = { dashboard: renderDashboard, sales: renderSales, menu: renderMenu, stock: renderStock, finance: renderFinance, users: renderUsers, reports: renderReports, whatsapp: renderWhatsapp, settings: renderSettings };
      renderers[tab]();
    }

    function renderDashboard() {
      $("page").innerHTML = `
        <section class="kpis">
          <div class="card blue"><span>Today's Sale</span><strong>${money(dashboard.totalSales)}</strong><small>Live</small></div>
          <div class="card green"><span>Total Collection</span><strong>${money(dashboard.totalSales)}</strong><small>Cash + Online</small></div>
          <div class="card orange"><span>Total Orders</span><strong>${dashboard.totalBills}</strong><small>Recorded</small></div>
          <div class="card"><span>Net Collection</span><strong>${money(dashboard.netCollection)}</strong><small>After expenses</small></div>
          <div class="card red"><span>Total Expenses</span><strong>${money(dashboard.totalExpenses)}</strong><small>Tracked</small></div>
        </section>
        <section class="grid-2">
          <div class="panel"><h2>Sales Overview</h2><div class="chart">${chartBars()}</div></div>
          <div class="panel"><h2>Payment Method</h2><div class="donut"><span>${money(dashboard.totalSales)}<br><small>Total</small></span></div>${paymentRows()}</div>
        </section>
        <section class="grid-3">
          <div class="panel"><h2>Recent Sales</h2>${salesTable(6)}</div>
          <div class="panel"><h2>Low Stock Items</h2>${lowStockRows()}</div>
          <div class="panel"><h2>POS Preview</h2>${phonePreview()}</div>
        </section>`;
    }

    function chartBars() {
      const values = dashboard.orders.slice(-7).map(order => Number(order.total || 0));
      const fallback = [20, 30, 44, 36, 56, 74, 62];
      const data = values.length ? values : fallback;
      const max = Math.max(...data, 1);
      return data.map(value => `<div class="bar" style="height:${Math.max(18, (value / max) * 100)}%"></div>`).join("");
    }

    function paymentRows() {
      return `<div class="list">

    function parseSubItems(text) {

    async function moveProduct(event) {
      const id = Number(event.currentTarget.dataset.moveProduct);
      const direction = event.currentTarget.dataset.direction;
      const sorted = dashboard.products.slice().sort((a, b) => productSortValue(a) - productSortValue(b));
      const index = sorted.findIndex(item => Number(item.id) === id);
      const targetIndex = direction === "up" ? index - 1 : index + 1;
      if (index < 0 || targetIndex < 0 || targetIndex >= sorted.length) return;
      const current = sorted[index];
      const target = sorted[targetIndex];
      const currentOrder = productSortValue(current, index);
      const targetOrder = productSortValue(target, targetIndex);
      await api("/products", { method: "POST", body: JSON.stringify({ ...current, sortOrder: targetOrder }) });
      await api("/products", { method: "POST", body: JSON.stringify({ ...target, sortOrder: currentOrder }) });
      pageMessage("Display order updated");
      await loadData();
    }

    function reportFilterLabel(key) {
      return ({ today: "Today", yesterday: "Yesterday", week: "This Week", month: "This Month", year: "This Year", custom: "Custom Range" })[key] || "Today";
    }

    function orderDate(order) {
      if (order.createdAt) return new Date(order.createdAt);
      if (order.syncedAt) return new Date(order.syncedAt);
      if (Number(order.id)) return new Date(Number(order.id));
      return new Date(order.time || Date.now());
    }

    function reportRange() {
      const now = new Date();
      const start = new Date(now);
      start.setHours(0, 0, 0, 0);
      const end = new Date(start);
      end.setDate(end.getDate() + 1);
      if (reportFilter === "yesterday") {
        start.setDate(start.getDate() - 1);
        end.setDate(end.getDate() - 1);
      } else if (reportFilter === "week") {
        start.setDate(start.getDate() - 6);
      } else if (reportFilter === "month") {
        start.setDate(1);
      } else if (reportFilter === "year") {
        start.setMonth(0);
        start.setDate(1);
      } else if (reportFilter === "custom") {
        const from = customFrom ? new Date(customFrom + "T00:00:00") : start;
        const to = customTo ? new Date(customTo + "T23:59:59") : end;
        return { start: from, end: to };
      }
      return { start, end };
    }

    function paymentBreakup(order) {
      const total = Number(order.total || 0);
      const breakup = order.paymentBreakup || {};
      if (order.payment === "Split") return { cash: Number(breakup.cash || 0), online: Number(breakup.online || 0), credit: Number(breakup.credit || 0) };
      if (order.payment === "Online") return { cash: 0, online: total, credit: 0 };
      if (order.payment === "Credit") return { cash: 0, online: 0, credit: total };
      if (order.payment === "Cancel") return { cash: 0, online: 0, credit: 0 };
      return { cash: total, online: 0, credit: 0 };
    }

    function reportDataset() {
      const { start, end } = reportRange();
      const orders = (dashboard.orders || []).filter(order => {
        const date = orderDate(order);
        return date >= start && date <= end;
      });
      const productCategory = new Map((dashboard.products || []).map(item => [String(item.id), item.category || "Other"]));
      const itemMap = new Map();
      const userMap = new Map();
      const categoryMap = new Map();
      const creditMap = new Map();
      let total = 0, cash = 0, online = 0, credit = 0, totalQty = 0;
      orders.forEach(order => {
        const amount = Number(order.total || 0);
        const pay = paymentBreakup(order);
        total += amount;
        cash += pay.cash;
        online += pay.online;
        credit += pay.credit;
        const userName = order.cashier || "Unknown";
        const userRow = userMap.get(userName) || { user: userName, orders: 0, cash: 0, online: 0, credit: 0, total: 0 };
        userRow.orders += 1;
        userRow.cash += pay.cash;
        userRow.online += pay.online;
        userRow.credit += pay.credit;
        userRow.total += amount;
        userMap.set(userName, userRow);
        if (pay.credit) {
          const name = order.creditName || "Unassigned Credit";
          const creditRow = creditMap.get(name) || { name, orders: 0, amount: 0 };
          creditRow.orders += 1;
          creditRow.amount += pay.credit;
          creditMap.set(name, creditRow);
        }
        (order.items || []).forEach(item => {
          const qty = Number(item.qty || 0);
          const lineTotal = qty * Number(item.price || 0);
          totalQty += qty;
          const row = itemMap.get(item.name) || { name: item.name || "Item", qty: 0, total: 0 };
          row.qty += qty;
          row.total += lineTotal;
          itemMap.set(row.name, row);
          const category = productCategory.get(String(item.id)) || "Other";
          const cat = categoryMap.get(category) || { category, qty: 0, total: 0 };
          cat.qty += qty;
          cat.total += lineTotal;
          categoryMap.set(category, cat);
        });
      });
      const items = [...itemMap.values()].sort((a, b) => b.qty - a.qty);
      const userSales = [...userMap.values()].sort((a, b) => b.total - a.total);
      const categories = [...categoryMap.values()].sort((a, b) => b.total - a.total);
      const creditRows = [...creditMap.values()].sort((a, b) => b.amount - a.amount);
      return { orders, total, cash, online, credit, totalQty, items, userSales, categories, creditRows };
    }

    function reportMetric(label, value, note) {
      return `<div class="card metric-card"><div class="metric-row"><span>${label}</span><div class="metric-icon">${String(label).slice(0, 1)}</div></div><strong>${value}</strong><small>${note}</small></div>`;
    }

    function billNo(order, index) {
      return "BILL-" + String(order.billNo || order.id || index + 1).slice(-6).padStart(6, "0");
    }

    function reportSalesTable(orders) {
      const rows = orders.slice().reverse().map((order, index) => {
        const qty = (order.items || []).reduce((sum, item) => sum + Number(item.qty || 0), 0);
        return `<tr><td>${esc(order.time || new Date(orderDate(order)).toLocaleString("en-IN"))}</td><td><strong>${billNo(order, index)}</strong></td><td>${esc((order.items || []).map(i => `${i.name} x ${i.qty}`).join(", "))}</td><td>${qty}</td><td>${money(order.total)}</td><td><span class="pill green">${esc(order.payment || "-")}</span></td><td>${esc(order.cashier || "-")}</td></tr>`;
      }).join("");
      return `<div class="table-wrap"><table><thead><tr><th>Time</th><th>Bill No</th><th>Items</th><th>Quantity</th><th>Amount</th><th>Payment Mode</th><th>Cashier/User</th></tr></thead><tbody>${rows || `<tr><td colspan="7">No sales for selected range</td></tr>`}</tbody></table></div>`;
    }

    function reportUserSalesHtml(rows) {
      return `<div class="table-wrap"><table><thead><tr><th>User name</th><th>Orders</th><th>Cash</th><th>Online</th><th>Credit</th><th>Total</th></tr></thead><tbody>${rows.map(item => `<tr><td><strong>${esc(item.user)}</strong></td><td>${item.orders}</td><td>${money(item.cash)}</td><td>${money(item.online)}</td><td>${money(item.credit)}</td><td>${money(item.total)}</td></tr>`).join("") || `<tr><td colspan="6">No user sales yet</td></tr>`}</tbody></table></div>`;
    }

    function reportItemsHtml(items, totalQty) {
      const rows = items.map((item, index) => {
        const percent = totalQty ? (item.qty / totalQty) * 100 : 0;
        return `<tr><td><strong>${esc(item.name)}</strong> ${index === 0 ? `<span class="pill orange">Top selling</span>` : ""}</td><td>${item.qty} pcs</td><td>${money(item.total)}</td><td><div class="progress"><span style="width:${percent.toFixed(1)}%"></span></div><small>${percent.toFixed(1)}%</small></td></tr>`;
      }).join("");
      return `<div class="table-wrap"><table><thead><tr><th>Item name</th><th>Quantity sold</th><th>Total amount</th><th>Percentage</th></tr></thead><tbody>${rows || `<tr><td colspan="4">No item sales yet</td></tr>`}</tbody></table></div>`;
    }

    function reportPaymentHtml(data) {
      const total = data.total || 1;
      const cashPct = Math.round((data.cash / total) * 100);
      const onlinePct = Math.round((data.online / total) * 100);
      const creditPct = Math.round((data.credit / total) * 100);
      return `<div class="grid-2-even" style="align-items:center;margin-bottom:0">
        <div class="donut small" style="background:conic-gradient(var(--green) 0 ${cashPct}%, var(--blue) ${cashPct}% ${cashPct + onlinePct}%, var(--orange) ${cashPct + onlinePct}% ${cashPct + onlinePct + creditPct}%, var(--purple) ${cashPct + onlinePct + creditPct}% 100%)"><span>Total<br>${money(data.total)}</span></div>
        <div class="list">
          <div class="list-row"><span>Cash total</span><strong>${money(data.cash)} (${cashPct}%)</strong></div>
          <div class="list-row"><span>Online total</span><strong>${money(data.online)} (${onlinePct}%)</strong></div>
          <div class="list-row"><span>Credit total</span><strong>${money(data.credit)} (${creditPct}%)</strong></div>
          <div class="list-row"><span>UPI / Card</span><strong>${money(dashboard.upi + dashboard.card)}</strong></div>
        </div>
      </div>`;
    }

    function reportCreditHtml(rows) {
      const body = rows.map(item => `<tr><td><strong>${esc(item.name)}</strong></td><td>${item.orders}</td><td>${money(item.amount)}</td></tr>`).join("");
      return `<div class="table-wrap"><table><thead><tr><th>Name</th><th>Orders</th><th>Credit Amount</th></tr></thead><tbody>${body || `<tr><td colspan="3">No credit sales in selected range</td></tr>`}</tbody></table></div>`;
    }

    function reportCategoryHtml(categories, total) {
      const wanted = ["Tiffin", "Meals", "Tea", "Snacks", "Drinks"];
      const rows = wanted.map(name => {
        const row = categories.find(item => item.category === name) || { category: name, qty: 0, total: 0 };
        const pct = total ? (row.total / total) * 100 : 0;
        return `<div class="list-row"><span>${esc(name)}</span><strong>${money(row.total)} (${pct.toFixed(1)}%)</strong></div>`;
      }).join("");
      return `<div class="list">${rows}</div>`;
    }

    function hourlyTrendHtml(orders) {
      const buckets = Array.from({ length: 8 }, (_, i) => ({ hour: 10 + i, total: 0 }));
      orders.forEach(order => {
        const hour = orderDate(order).getHours();
        const bucket = buckets.find(item => item.hour === hour);
        if (bucket) bucket.total += Number(order.total || 0);
      });
      const max = Math.max(...buckets.map(item => item.total), 1);
      return `<div class="chart-line">${buckets.map(item => `<div class="point" title="${item.hour}:00 - ${money(item.total)}" style="height:${Math.max(8, (item.total / max) * 100)}%"></div>`).join("")}</div>`;
    }

    async function handleReportAction(event) {
      const action = event.currentTarget.dataset.export;
      const data = reportDataset();
      if (action === "print" || action === "pdf") {
        window.print();
        pageMessage(action === "pdf" ? "Use print dialog to save as PDF" : "Report sent to print dialog");
      } else if (action === "excel") {
        exportCsv(data);
      } else if (action === "whatsapp") {
        pageMessage("Sending WhatsApp report...");
        try {
          await api("/whatsapp/send-test-report", { method: "POST", body: JSON.stringify({}) });
          pageMessage("WhatsApp report sent");
        } catch (error) {
          pageMessage(`WhatsApp report failed: ${error.message}`, "error");
        }
      }
    }

    function exportCsv(data) {
      const header = ["Time", "Bill No", "Items", "Quantity", "Amount", "Payment Mode", "Cashier/User"];
      const rows = data.orders.map((order, index) => [
        order.time || "",
        billNo(order, index),
        (order.items || []).map(item => `${item.name} x ${item.qty}`).join("; "),
        (order.items || []).reduce((sum, item) => sum + Number(item.qty || 0), 0),
        Number(order.total || 0),
        order.payment || "",
        order.cashier || ""
      ]);
      const csv = [header, ...rows].map(row => row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")).join("\n");
      const link = document.createElement("a");
      link.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
      link.download = `canteen-report-${reportFilter}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);
      pageMessage("Excel CSV exported");
    }

    function renderWhatsapp() {
      $("page").innerHTML = `<section class="grid-2">
        <div class="panel"><h2>Auto WhatsApp Report</h2><div class="wa-card">
          <strong>${esc(settings.canteenName)} - Daily Report</strong><br>
          Date: ${new Date().toLocaleDateString("en-IN")}<br>
          Total Sale: ${money(dashboard.totalSales)}<br>
          Total Orders: ${dashboard.totalBills}<br>
          Cash: ${money(dashboard.cash)}<br>
          Online: ${money(dashboard.online + dashboard.upi)}<br>
          Card: ${money(dashboard.card)}<br>
          Top Item: ${esc((dashboard.topItems[0] || {}).name || "-")}<br>
          Report Time: ${esc(settings.reportTime || "22:00")}<br>
          Auto Report: ${settings.autoReport ? "ON" : "OFF"}<br>
          Type: ${esc(settings.reportType || "daily")}
        </div>${whatsappStatusHtml()}</div>
        <div class="panel"><h2>WhatsApp Settings</h2><form class="settings-grid" id="reportForm">
          <label>Report Time <input id="reportTime" value="${esc(settings.reportTime || "22:00")}" placeholder="22:00"></label>
          <label>Admin WhatsApp Number <input id="adminWhatsAppNumber" value="${esc(settings.adminWhatsAppNumber || settings.reportPhone || "")}" placeholder="919999999999"></label>
          <label>Report Type <select id="reportType">
            <option value="daily" ${settings.reportType === "daily" ? "selected" : ""}>Daily</option>
            <option value="weekly" ${settings.reportType === "weekly" ? "selected" : ""}>Weekly</option>
            <option value="monthly" ${settings.reportType === "monthly" ? "selected" : ""}>Monthly</option>
            <option value="yearly" ${settings.reportType === "yearly" ? "selected" : ""}>Yearly</option>
          </select></label>
          <label>Auto Report <select id="autoReport">
            <option value="true" ${settings.autoReport ? "selected" : ""}>ON</option>
            <option value="false" ${!settings.autoReport ? "selected" : ""}>OFF</option>
          </select></label>
          <button class="primary">Save Report</button>
          <button class="secondary" type="button" id="sendTestReport">Save & Send Test</button>
        </form></div>
        <div class="panel"><h2>WhatsApp Logs</h2>${whatsappLogsHtml()}</div>
      </section>`;
      $("reportForm").addEventListener("submit", saveReportSettings);
      $("sendTestReport").addEventListener("click", sendTestReport);
    }

    function whatsappStatusHtml() {
      return `<div class="list" style="margin-top:12px">
        <div class="list-row"><span>Token</span><strong>${whatsappStatus.tokenConfigured ? "Configured" : "Missing"}</strong></div>
        <div class="list-row"><span>Phone Number ID</span><strong>${whatsappStatus.phoneNumberIdConfigured ? "Configured" : "Missing"}</strong></div>
        <div class="list-row"><span>Recipient</span><strong>${whatsappStatus.recipientConfigured ? "Configured" : "Missing"}</strong></div>
        <div class="list-row"><span>Auto Report</span><strong>${whatsappStatus.autoReport ? "ON" : "OFF"}</strong></div>
      </div>`;
    }

    async function saveReportSettings(event) {
      event.preventDefault();
      const data = await api("/settings", {
        method: "POST",
        body: JSON.stringify({
          reportTime: $("reportTime").value,
          adminWhatsAppNumber: $("adminWhatsAppNumber").value,
          reportPhone: $("adminWhatsAppNumber").value,
          reportType: $("reportType").value,
          autoReport: $("autoReport").value === "true"
        })
      });
      applySettings(data.settings);
      pageMessage("WhatsApp report settings saved");
      await loadData();
      renderWhatsapp();
    }

    async function sendTestReport() {
      pageMessage("Saving settings and sending WhatsApp test report...");
      try {
        await api("/settings", {
          method: "POST",
          body: JSON.stringify({
            reportTime: $("reportTime").value,
            adminWhatsAppNumber: $("adminWhatsAppNumber").value,
            reportPhone: $("adminWhatsAppNumber").value,
            reportType: $("reportType").value,
            autoReport: $("autoReport").value === "true"
          })
        });
        await api("/whatsapp/send-test-report", { method: "POST", body: JSON.stringify({}) });
        pageMessage("WhatsApp test report sent");
      } catch (error) {
        pageMessage(`WhatsApp test failed: ${error.message || "Check token, phone number ID, and admin number."}`, "error");
      }
      await loadData();
      renderWhatsapp();
    }

    function whatsappLogsHtml() {
      if (!whatsappLogs.length) return `<span class="muted">No WhatsApp logs yet</span>`;
      return `<table><thead><tr><th>Time</th><th>Recipient</th><th>Status</th><th>Details</th></tr></thead><tbody>${whatsappLogs.slice(0, 10).map(log => `
        <tr><td>${esc(new Date(log.time).toLocaleString("en-IN"))}</td><td>${esc(log.to || "-")}</td><td>${log.success ? `<span class="pill green">Sent</span>` : `<span class="pill red">Failed</span>`}</td><td>${esc(log.error || log.reason || "-")}</td></tr>
      `).join("")}</tbody></table>`;
    }

    function renderSettings() {
      $("page").innerHTML = `<section class="panel"><h2>Settings</h2><form class="settings-grid" id="settingsForm">
        <label>Canteen Name <input id="canteenNameInput" value="${esc(settings.canteenName)}"></label>
        <label>Brand <input id="brandNameInput" value="${esc(settings.brandName || "axzen")}"></label>
        <label>Tagline <input id="taglineInput" value="${esc(settings.tagline || "Infotech")}"></label>
        <label>Logo URL <input id="logoUrlInput" value="${esc(settings.logoUrl || "")}" placeholder="https://..."></label>
        <button class="primary">Save Settings</button>
      </form></section>`;
      $("settingsForm").addEventListener("submit", saveSettings);
    }

    async function saveSettings(event) {
      event.preventDefault();
      const data = await api("/settings", { method: "POST", body: JSON.stringify({ canteenName: $("canteenNameInput").value || "Main Canteen", brandName: $("brandNameInput").value || "axzen", tagline: $("taglineInput").value || "Infotech", logoUrl: $("logoUrlInput").value || "" }) });
      applySettings(data.settings);
      pageMessage("Settings saved");
      renderSettings();
    }

    $("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      try {
        const data = await api("/login", { method: "POST", body: JSON.stringify({ mobile: $("mobileInput").value, password: $("passwordInput").value }) });
        if (data.user.role !== "admin") throw new Error("Admin only");
        session = data.user;
        localStorage.setItem("AXEN_ADMIN_SESSION", JSON.stringify(session));
        if (data.token) localStorage.setItem("AXEN_ADMIN_TOKEN", data.token);
        applySettings(data.settings);
        showApp();
      } catch {
        $("loginStatus").textContent = "Admin login failed";
        $("loginStatus").className = "status error";
      }
    });

    $("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("AXEN_ADMIN_SESSION");
      localStorage.removeItem("AXEN_ADMIN_TOKEN");
      location.reload();
    });
    document.querySelectorAll("[data-tab]").forEach(btn => btn.addEventListener("click", () => { tab = btn.dataset.tab; pageMessage(""); render(); }));
    if (session && session.role === "admin") showApp();
  </script>
</body>
</html>
