<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axzen Infotech POS</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --page: #f5f5f7;
      --panel: #ffffff;
      --navy: #101828;
      --blue: #007aff;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --shadow: 0 18px 45px #11182714;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #fbfbfd, #f5f5f7);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Arial, sans-serif;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .hidden { display: none !important; }

    .app {
      max-width: 480px;
      min-height: 100vh;
      margin: 0 auto;
      background: #f7f8fb;
      box-shadow: 0 0 45px #11182718;
      overflow-x: hidden;
    }

    .login {
      min-height: 100vh;
      display: grid;
      align-content: center;
      gap: 24px;
      padding: 30px 20px;
      background: linear-gradient(160deg, #ffffff, #eef5ff 58%, #f8fafc);
    }

    .brand-lockup { text-align: center; }
    .powered { margin: 0 0 5px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .brand-name { margin: 0; font-size: 48px; line-height: .95; letter-spacing: 0; color: var(--ink); }
    .tagline { margin: 7px 0 0; color: var(--blue); font-size: 15px; font-weight: 900; text-transform: uppercase; }

    .login-card, .panel, .sheet {
      border: 1px solid #ffffff;
      border-radius: 18px;
      background: #ffffffdc;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .login-card { padding: 22px; display: grid; gap: 14px; }
    .login-card h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
    .login-card p { margin: -6px 0 4px; color: var(--muted); font-size: 14px; }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      border: 1px solid #dfe3eb;
      border-radius: 12px;
      padding: 13px 14px;
      background: #fbfcff;
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 4px #007aff1c; background: white; }

    .primary, .secondary, .danger {
      min-height: 46px;
      border: 0;
      border-radius: 12px;
      font-weight: 900;
    }

    .primary { background: linear-gradient(180deg, #1684ff, #006de8); color: white; box-shadow: 0 12px 26px #007aff30; }
    .secondary { background: #f2f7ff; color: var(--blue); border: 1px solid #d7e8ff; }
    .danger { background: #fff5f5; color: var(--red); border: 1px solid #ffd9d9; }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      background: #fbfbfde8;
      border-bottom: 1px solid #e8edf4;
      backdrop-filter: blur(20px);
    }

    .title-block { min-width: 0; }
    .title-block strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 16px; }
    .title-block span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .connection-line {
      display: inline-flex !important;
      align-items: center;
      gap: 6px;
      min-height: 18px;
    }
    .net-badge {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: white;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      box-shadow: 0 4px 10px #11182718;
    }
    .net-badge.online { background: var(--green); }
    .net-badge.online::before { content: "✓"; }
    .net-badge.offline { background: var(--red); }
    .net-badge.offline::before { content: "!"; }
    .net-badge.syncing { background: var(--orange); }
    .net-badge.syncing::before { content: "..."; font-size: 8px; }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid #e1e6ee;
      border-radius: 12px;
      background: white;
      color: var(--ink);
      font-weight: 900;
    }

    .content { padding: 14px 12px 360px; }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 13px;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid #e1e6ee;
      border-radius: 999px;
      padding: 10px 13px;
      background: white;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .tab.active { background: #111827; border-color: #111827; color: white; }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .item-card {
      position: relative;
      min-height: 178px;
      border: 1px solid #e8edf4;
      border-radius: 14px;
      background: white;
      box-shadow: 0 10px 24px #1118270d;
      display: grid;
      grid-template-rows: 112px auto auto;
      gap: 8px;
      padding: 8px;
      text-align: center;
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .item-card:active { transform: scale(.97); }
    .item-card:hover { border-color: #cfe0f5; box-shadow: 0 14px 30px #11182714; }

    .item-icon {
      width: 100%;
      height: 112px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #f0f7ff, #fff8e8);
      background-size: cover;
      background-position: center;
      font-size: 0;
      font-weight: 900;
      color: var(--blue);
      box-shadow: inset 0 1px 0 #fff;
    }
    .item-icon.initials { font-size: 13px; background: linear-gradient(145deg, #eef7ff, #fff8e8); }

    .item-card h3 { margin: 0; font-size: 14px; line-height: 1.18; overflow-wrap: anywhere; }
    .item-card p { margin: 0; color: var(--muted); font-size: 13px; font-weight: 900; }
    .count-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: white;
      border: 2px solid white;
      font-size: 14px;
      font-weight: 950;
      box-shadow: 0 8px 18px #ef444455;
    }

    .cart-sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 6;
      width: min(480px, 100%);
      transform: translateX(-50%);
      border-top: 1px solid #e8edf4;
      background: #fffffff2;
      box-shadow: 0 -18px 45px #11182718;
      backdrop-filter: blur(20px);
    }

    .cart-inner { padding: 13px; }
    .cart-head, .row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .cart-head strong { font-size: 14px; }
    .cart-head button { border: 0; background: transparent; color: var(--red); font-size: 12px; font-weight: 900; }

    .cart-list {
      display: grid;
      gap: 8px;
      max-height: 122px;
      overflow: auto;
      margin: 8px 0 10px;
    }

    .cart-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .cart-row small { display: block; margin-top: 2px; color: var(--muted); font-weight: 800; }
    .qty { display: grid; grid-template-columns: 28px 28px 28px; align-items: center; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; text-align: center; }
    .qty button { height: 28px; border: 0; background: #f3f6fb; color: var(--blue); font-weight: 900; }

    .pay-toggle { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 10px; }
    .pay-toggle button { min-height: 40px; border: 1px solid var(--line); border-radius: 12px; background: white; font-weight: 900; }
    .pay-toggle button.active { background: var(--green); border-color: var(--green); color: white; }
    .pay-toggle button[data-pay="Cancel"].active { background: var(--red); border-color: var(--red); }
    .split-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .split-box input { padding: 10px; border-radius: 10px; }

    .place { width: 100%; margin-top: 8px; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 7;
      width: min(480px, 100%);
      transform: translateX(-50%);
      display: none;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
      background: white;
    }

    .bottom-nav.user-nav { bottom: 254px; }
    .bottom-nav button { min-height: 56px; border: 0; background: white; color: var(--muted); font-size: 11px; font-weight: 900; }
    .bottom-nav button.active { color: var(--blue); }

    .admin-shell { min-height: 100vh; background: var(--page); }
    .admin-hero {
      padding: 18px 14px;
      background: linear-gradient(145deg, #111827, #172033);
      color: white;
    }
    .admin-hero .brand-name { color: white; font-size: 34px; }
    .admin-hero .tagline { color: #8ec5ff; }

    .admin-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
    .admin-tabs button { min-height: 42px; border: 1px solid var(--line); border-radius: 12px; background: white; color: var(--ink); font-size: 12px; font-weight: 900; }
    .admin-tabs button.active { background: var(--blue); color: white; border-color: var(--blue); }
    .admin-page { padding: 0 12px 22px; display: grid; gap: 12px; }

    .kpis { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .kpi { padding: 14px; border: 1px solid #e8edf4; border-radius: 16px; background: white; box-shadow: 0 10px 26px #1118270d; }
    .kpi span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .kpi strong { display: block; margin-top: 8px; font-size: 22px; }

    .panel { padding: 14px; }
    .panel h2 { margin: 0 0 12px; font-size: 17px; }
    .stack { display: grid; gap: 10px; }
    .order-line, .user-line { display: grid; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .order-line:last-child, .user-line:last-child { border-bottom: 0; }
    .muted { color: var(--muted); font-size: 12px; font-weight: 800; }

    .form-grid { display: grid; gap: 10px; }

    @media (max-width: 360px) {
      .brand-name { font-size: 36px; }
      .cart-sheet { font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="login" id="loginView">
      <div class="brand-lockup">
        <p class="powered">Powered by</p>
        <h1 class="brand-name">Axzen</h1>
        <p class="tagline">Infotech</p>
      </div>
      <form class="login-card" id="loginForm">
        <h1>Sign in</h1>
        <p id="loginCanteen">Main Canteen</p>
        <label>Mobile number <input id="mobileInput" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" autocomplete="current-password" required></label>
        <button class="primary" type="submit">Login</button>
        <div class="status" id="loginStatus">Admin default: admin / 1234</div>
      </form>
    </section>

    <section id="posView" class="hidden">
      <header class="topbar">
        <button class="icon-btn" id="logoutPos">X</button>
        <div class="title-block">
          <strong id="posCanteen">Main Canteen</strong>
          <span class="connection-line"><span class="net-badge offline" id="connectionBadge"></span><span id="syncStatus">Connect internet</span></span>
        </div>
        <button class="icon-btn" id="profileBtn">...</button>
      </header>
      <section class="content">
        <div class="tabs" id="categoryTabs"></div>
        <div class="menu-grid" id="menuGrid"></div>
      </section>
      <nav class="bottom-nav user-nav" id="userNav">
        <button class="active">Home</button>
        <button>Orders</button>
        <button>Sales</button>
        <button>Profile</button>
      </nav>
      <section class="cart-sheet">
        <div class="cart-inner">
          <div class="cart-head">
            <strong id="cartTitle">Cart (0 items)</strong>
            <button id="clearCart">Clear</button>
          </div>
          <div class="cart-list" id="cartList"></div>
          <div class="row-between">
            <strong>Total Amount</strong>
            <strong id="cartTotal">Rs 0</strong>
          </div>
          <div class="pay-toggle">
            <button class="active" data-pay="Cash">Cash</button>
            <button data-pay="Online">Online</button>
            <button data-pay="Split">Split</button>
            <button data-pay="Cancel">Cancel</button>
          </div>
          <div class="split-box hidden" id="splitBox">
            <label>Cash <input id="splitCash" type="number" min="0" inputmode="numeric"></label>
            <label>Online <input id="splitOnline" type="number" min="0" inputmode="numeric"></label>
          </div>
          <button class="primary place" id="placeOrder">Place Order</button>
          <div class="status" id="posMessage"></div>
        </div>
      </section>
    </section>

    <section id="adminView" class="admin-shell hidden">
      <div class="admin-hero">
        <div class="brand-lockup">
          <p class="powered">Powered by</p>
          <h1 class="brand-name">Axzen</h1>
          <p class="tagline">Infotech</p>
        </div>
        <div class="row-between" style="margin-top:16px">
          <div>
            <strong id="adminCanteen">Main Canteen</strong>
            <div class="muted" id="adminRole">Admin Panel</div>
          </div>
          <button class="icon-btn" id="logoutAdmin">X</button>
        </div>
      </div>
      <div class="admin-tabs">
        <button class="active" data-admin-tab="dashboard">Home</button>
        <button data-admin-tab="users">Users</button>
        <button data-admin-tab="orders">Sales</button>
        <button data-admin-tab="settings">Settings</button>
      </div>
      <section class="admin-page" id="adminPage"></section>
    </section>
  </main>

  <script>
    const apiParam = new URLSearchParams(window.location.search).get("api");
    if (apiParam) localStorage.setItem("AXEN_API_URL", apiParam);
    const liveApi = "https://canteen.axzen.in";
    const browserHost = window.location.hostname && window.location.hostname !== "localhost"
      ? window.location.hostname
      : "localhost";
    const nativeHost = window.Capacitor ? "192.168.29.115" : browserHost;
    const storedApi = localStorage.getItem("AXEN_API_URL");
    const storedApiIsLocal = storedApi && /localhost|127\.0\.0\.1|10\.0\.2\.2|192\.168\.|http:\/\/10\.|http:\/\/172\.(1[6-9]|2\d|3[0-1])\./.test(storedApi);
    const productionApi = window.location.protocol === "https:" ? window.location.origin : "";
    const API = productionApi
      ? productionApi
      : window.Capacitor && (!storedApi || storedApiIsLocal)
      ? liveApi
      : (storedApi || `http://${nativeHost}:5000`);

    const categoryOrder = ["All", "Tiffin", "Meals", "Tea", "Snacks", "Juice", "Drinks", "Lunch", "Dinner"];
    const productCacheKey = "AXEN_PRODUCTS";
    const pendingOrdersKey = "AXEN_PENDING_ORDERS";
    const sessionKey = "AXEN_SESSION";
    const tokenKey = "AXEN_TOKEN";
    const loginCacheKey = "AXEN_LOGIN_CACHE";
    let settings = { canteenName: "Main Canteen", brandName: "Axzen", tagline: "Infotech" };
    let user = null;
    let products = [];
    let orders = [];
    let users = [];
    let activeCategory = "All";
    let cart = [];
    let payment = "Cash";
    let adminTab = "dashboard";
    let serverOnline = navigator.onLine;

    const $ = id => document.getElementById(id);
    const money = value => "Rs " + Number(value || 0).toFixed(0);
    const readJson = (key, fallback) => {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; }
    };
    const writeJson = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    const pendingOrders = () => readJson(pendingOrdersKey, []);
    const setPendingOrders = value => { writeJson(pendingOrdersKey, value); updateSyncStatus(); };

    function setConnectionState(state, text) {
      const badge = $("connectionBadge");
      if (badge) badge.className = `net-badge ${state}`;
      if ($("syncStatus")) $("syncStatus").textContent = text;
    }

    async function api(path, options = {}) {
      const token = localStorage.getItem(tokenKey);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);
      const response = await fetch(API + path, {
        ...options,
        signal: controller.signal,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {})
        }
      }).finally(() => clearTimeout(timeout));
      if (!response.ok) throw new Error("Request failed");
      return response.json();
    }

    function applySettings(next = {}) {
      settings = { ...settings, ...next };
      $("loginCanteen").textContent = settings.canteenName;
      $("posCanteen").textContent = settings.canteenName;
      $("adminCanteen").textContent = settings.canteenName;
    }

    function show(view) {
      ["loginView", "posView", "adminView"].forEach(id => $(id).classList.add("hidden"));
      $(view).classList.remove("hidden");
    }

    function setSession(nextUser, token) {
      user = nextUser;
      writeJson(sessionKey, user);
      if (token) localStorage.setItem(tokenKey, token);
    }

    function cacheLogin(mobile, password, nextUser) {
      const cache = readJson(loginCacheKey, {});
      cache[String(mobile).trim()] = {
        password: String(password),
        user: nextUser,
        savedAt: new Date().toISOString()
      };
      writeJson(loginCacheKey, cache);
    }

    function offlineLogin(mobile, password) {
      const cache = readJson(loginCacheKey, {});
      const saved = cache[String(mobile).trim()];
      if (!saved || String(saved.password) !== String(password)) return null;
      return saved.user;
    }

    function logout() {
      localStorage.removeItem(sessionKey);
      localStorage.removeItem(tokenKey);
      user = null;
      cart = [];
      show("loginView");
    }

    function updateSyncStatus(text, state) {
      const count = pendingOrders().length;
      if (!$("syncStatus")) return;
      if (state) return setConnectionState(state, text || "");
      if (!navigator.onLine || !serverOnline) return setConnectionState("offline", "Connect internet");
      if (count) return setConnectionState("syncing", text || `${count} pending sync`);
      setConnectionState("online", text || "Connected");
    }

    async function checkServerConnection() {
      if (!navigator.onLine) {
        serverOnline = false;
        updateSyncStatus("Connect internet", "offline");
        return false;
      }

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3500);
      try {
        const response = await fetch(API + "/health", {
          cache: "no-store",
          signal: controller.signal
        });
        serverOnline = response.ok;
      } catch {
        serverOnline = false;
      } finally {
        clearTimeout(timeout);
      }

      updateSyncStatus(serverOnline ? undefined : "Connect internet", serverOnline ? undefined : "offline");
      return serverOnline;
    }

    async function loadSettings() {
      try {
        const data = await api("/settings");
        applySettings(data);
      } catch {
        applySettings(settings);
      }
    }

    async function loadProducts() {
      const cached = readJson(productCacheKey, []);
      if (cached.length) products = cached;
      try {
        products = await api("/products");
        writeJson(productCacheKey, products);
      } catch {}
      renderProducts();
    }

    async function loadAdminData() {
      try {
        const dashboard = await api("/dashboard");
        orders = dashboard.orders || [];
      } catch {}
      try {
        users = await api("/users");
      } catch {}
      renderAdmin();
    }

    function renderCategories() {
      const found = new Set(products.map(item => item.category || "Other"));
      const categories = [...categoryOrder.filter(item => item === "All" || found.has(item)), ...[...found].filter(item => !categoryOrder.includes(item))];
      $("categoryTabs").innerHTML = categories.map(category => `
        <button class="tab ${category === activeCategory ? "active" : ""}" data-category="${category}">${category}</button>
      `).join("");
    }

    function renderProducts() {
      renderCategories();
      const visible = activeCategory === "All" ? products : products.filter(item => item.category === activeCategory);
      $("menuGrid").innerHTML = visible.map(item => `
        <button class="item-card" data-item="${item.id}">
          ${cartQty(item.id) ? `<span class="count-badge">${cartQty(item.id)}</span>` : ""}
          <span class="item-icon ${item.image ? "" : "initials"}" style="${item.image ? `background-image:url('${item.image.replace(/'/g, "%27")}')` : ""}">${String(item.name || "?").slice(0, 2).toUpperCase()}</span>
          <h3>${item.name}</h3>
          <p>${money(item.price)}</p>
        </button>
      `).join("") || `<div class="panel">No menu items</div>`;
    }

    function cartQty(id) {
      const item = cart.find(row => Number(row.id) === Number(id));
      return item ? Number(item.qty || 0) : 0;
    }

    function addToCart(id) {
      const product = products.find(item => Number(item.id) === Number(id));
      if (!product) return;
      const existing = cart.find(item => Number(item.id) === Number(id));
      if (existing) existing.qty += 1;
      else cart.push({ ...product, qty: 1 });
      renderCart();
      renderProducts();
    }

    function changeQty(id, amount) {
      cart = cart.map(item => Number(item.id) === Number(id) ? { ...item, qty: item.qty + amount } : item).filter(item => item.qty > 0);
      renderCart();
      renderProducts();
    }

    function renderCart() {
      const total = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      $("cartTitle").textContent = `Cart (${cart.reduce((sum, item) => sum + item.qty, 0)} items)`;
      $("cartTotal").textContent = money(total);
      $("cartList").innerHTML = cart.map(item => `
        <div class="cart-row">
          <div><strong>${item.name}</strong><small>${item.qty} x ${money(item.price)}</small></div>
          <div class="qty">
            <button data-qty="-1" data-id="${item.id}">-</button>
            <span>${item.qty}</span>
            <button data-qty="1" data-id="${item.id}">+</button>
          </div>
        </div>
      `).join("") || `<div class="muted">Cart empty</div>`;
      updateSplitDefaults(total);
    }

    function paymentBreakup(total) {
      if (payment === "Split") {
        const cash = Math.max(0, Number($("splitCash").value || 0));
        const online = Math.max(0, Number($("splitOnline").value || 0));
        return { cash, online };
      }
      if (payment === "Online") return { cash: 0, online: total };
      if (payment === "Cancel") return { cash: 0, online: 0 };
      return { cash: total, online: 0 };
    }

    function updateSplitDefaults(total) {
      if (!$("splitCash") || document.activeElement === $("splitCash") || document.activeElement === $("splitOnline")) return;
      if (payment === "Split") {
        $("splitCash").value = Math.ceil(total / 2);
        $("splitOnline").value = Math.max(0, total - Number($("splitCash").value || 0));
      }
    }

    function receiptText(order) {
      const lines = (order.items || []).map(item => `${item.name} x ${item.qty} = ${money(Number(item.price) * item.qty)}`).join("\n");
      const breakup = order.paymentBreakup || {};
      const payLine = order.payment === "Split"
        ? `Payment Split\nCash ${money(breakup.cash)}\nOnline ${money(breakup.online)}`
        : `Payment ${order.payment}`;
      return `${settings.canteenName}\n${order.time}\nCashier: ${order.cashier || "-"}\n------------------------\n${lines}\n------------------------\nTotal ${money(order.total)}\n${payLine}\n`;
    }

    async function receipt(order) {
      const text = receiptText(order);
      if (window.AxenPrinter && typeof window.AxenPrinter.print === "function") {
        try {
          const result = window.AxenPrinter.print(text);
          $("posMessage").textContent = result || "Order saved and print sent";
          $("posMessage").className = "status ok";
          return;
        } catch (error) {
          $("posMessage").textContent = "Order saved. Printer not connected.";
          $("posMessage").className = "status error";
          return;
        }
      }
      console.log(text);
    }

    async function syncPendingOrders() {
      const pending = pendingOrders();
      const connected = await checkServerConnection();
      if (!pending.length) return updateSyncStatus();
      if (!connected) return updateSyncStatus("Connect internet", "offline");
      try {
        updateSyncStatus("Syncing...", "syncing");
        const data = await api("/orders/sync", { method: "POST", body: JSON.stringify({ orders: pending }) });
        const synced = new Set(data.synced || []);
        setPendingOrders(pending.filter(order => !synced.has(order.clientOrderId) && !synced.has(order.id)));
      } catch {
        serverOnline = false;
        updateSyncStatus("Connect internet", "offline");
      }
    }

    async function placeOrder() {
      if (!cart.length) return;
      const orderTotal = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      const payload = {
        id: Date.now(),
        clientOrderId: "mobile-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        time: new Date().toLocaleString(),
        canteen: settings.canteenName,
        cashier: user.name,
        payment,
        paymentBreakup: paymentBreakup(orderTotal),
        total: orderTotal,
        items: cart.map(item => ({ id: item.id, name: item.name, price: item.price, qty: item.qty }))
      };
      if (payment === "Split" && Math.round((payload.paymentBreakup.cash + payload.paymentBreakup.online) * 100) !== Math.round(payload.total * 100)) {
        $("posMessage").textContent = `Split amount must equal ${money(payload.total)}`;
        $("posMessage").className = "status error";
        return;
      }
      if (payment === "Cancel") payload.total = 0;

      try {
        const saved = await api("/orders", { method: "POST", body: JSON.stringify(payload) });
        serverOnline = true;
        updateSyncStatus();
        $("posMessage").textContent = "Order saved";
        $("posMessage").className = "status ok";
        await receipt(saved.order || payload);
      } catch {
        serverOnline = false;
        setPendingOrders([...pendingOrders(), payload]);
        $("posMessage").textContent = "Offline saved. Auto sync pending.";
        $("posMessage").className = "status ok";
        await receipt(payload);
      }

      cart = [];
      renderCart();
      renderProducts();
      await loadAdminData();
    }

    function dashboardStats() {
      const total = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
      const cash = orders.filter(order => order.payment === "Cash").reduce((sum, order) => sum + Number(order.total || 0), 0);
      const online = total - cash;
      return { total, cash, online, count: orders.length };
    }

    function renderAdmin() {
      const stats = dashboardStats();
      const page = $("adminPage");
      document.querySelectorAll("[data-admin-tab]").forEach(btn => btn.classList.toggle("active", btn.dataset.adminTab === adminTab));

      if (adminTab === "dashboard") {
        page.innerHTML = `
          <div class="kpis">
            <div class="kpi"><span>Today Sale</span><strong>${money(stats.total)}</strong></div>
            <div class="kpi"><span>Total Orders</span><strong>${stats.count}</strong></div>
            <div class="kpi"><span>Cash</span><strong>${money(stats.cash)}</strong></div>
            <div class="kpi"><span>Online</span><strong>${money(stats.online)}</strong></div>
          </div>
          <div class="panel"><h2>Work Flow</h2><div class="muted">Admin creates users -> User login -> Select item -> Place order -> Sale recorded -> Sync report</div></div>
          <div class="panel"><h2>Top Items</h2>${topItemsHtml()}</div>
        `;
      } else if (adminTab === "orders") {
        page.innerHTML = `<div class="panel"><h2>Recent Sales</h2>${orders.slice().reverse().map(order => `
          <div class="order-line"><strong>${order.canteen || settings.canteenName} - ${money(order.total)}</strong><span class="muted">${order.time} | ${order.payment} | ${order.cashier || "-"}</span></div>
        `).join("") || `<div class="muted">No orders</div>`}</div>`;
      } else if (adminTab === "users") {
        page.innerHTML = `
          <div class="panel">
            <h2>Create User</h2>
            <form class="form-grid" id="userForm">
              <input id="newName" placeholder="Name" required>
              <input id="newMobile" placeholder="Mobile number" required>
              <input id="newPassword" placeholder="Password" required>
              <select id="newRole"><option value="user">User</option><option value="admin">Admin</option></select>
              <button class="primary">Save User</button>
            </form>
          </div>
          <div class="panel"><h2>Users</h2>${users.map(item => `
            <div class="user-line"><strong>${item.name}</strong><span class="muted">${item.mobile} | ${item.role}</span></div>
          `).join("")}</div>
        `;
        $("userForm").addEventListener("submit", saveUser);
      } else {
        page.innerHTML = `
          <div class="panel">
            <h2>Settings</h2>
            <form class="form-grid" id="settingsForm">
              <label>Canteen name <input id="canteenNameInput" value="${settings.canteenName}"></label>
              <label>Server URL <input id="apiInput" value="${API}"></label>
              <button class="primary">Save Settings</button>
            </form>
          </div>
        `;
        $("settingsForm").addEventListener("submit", saveSettings);
      }
    }

    function topItemsHtml() {
      const counts = new Map();
      orders.forEach(order => (order.items || []).forEach(item => {
        counts.set(item.name, (counts.get(item.name) || 0) + Number(item.qty || 0));
      }));
      return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, qty]) =>
        `<div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--line)"><strong>${name}</strong><span>${qty}</span></div>`
      ).join("") || `<div class="muted">No sales yet</div>`;
    }

    async function saveUser(event) {
      event.preventDefault();
      await api("/users", {
        method: "POST",
        body: JSON.stringify({
          name: $("newName").value,
          mobile: $("newMobile").value,
          password: $("newPassword").value,
          role: $("newRole").value
        })
      });
      await loadAdminData();
    }

    async function saveSettings(event) {
      event.preventDefault();
      const nextApi = $("apiInput").value.trim().replace(/\/$/, "");
      if (nextApi) localStorage.setItem("AXEN_API_URL", nextApi);
      const data = await api("/settings", {
        method: "POST",
        body: JSON.stringify({ canteenName: $("canteenNameInput").value.trim() || "Main Canteen" })
      });
      applySettings(data.settings);
      await loadAdminData();
    }

    async function login(event) {
      event.preventDefault();
      const mobile = $("mobileInput").value;
      const password = $("passwordInput").value;
      $("loginStatus").textContent = "Checking...";
      $("loginStatus").className = "status";
      try {
        const data = await api("/login", {
          method: "POST",
          body: JSON.stringify({ mobile, password })
        });
        setSession(data.user, data.token);
        cacheLogin(mobile, password, data.user);
        applySettings(data.settings);
        await enterApp();
      } catch {
        const cachedUser = offlineLogin(mobile, password);
        if (cachedUser) {
          setSession(cachedUser);
          $("loginStatus").textContent = "Offline login success. Sync pending when internet returns.";
          $("loginStatus").className = "status ok";
          await enterApp();
          return;
        }

        $("loginStatus").textContent = "Invalid mobile/password or no cached offline login";
        $("loginStatus").className = "status error";
      }
    }

    async function enterApp() {
      if (!user) return show("loginView");
      if (user.role === "admin") {
        $("adminRole").textContent = `${user.name} | Admin`;
        show("adminView");
        updateSyncStatus();
        await loadSettings();
        await loadAdminData();
        await syncPendingOrders();
      } else {
        show("posView");
        renderCart();
        updateSyncStatus();
        await loadSettings();
        await loadProducts();
        await syncPendingOrders();
      }
    }

    $("loginForm").addEventListener("submit", login);
    $("logoutPos").addEventListener("click", logout);
    $("logoutAdmin").addEventListener("click", logout);
    $("categoryTabs").addEventListener("click", event => {
      const btn = event.target.closest("[data-category]");
      if (!btn) return;
      activeCategory = btn.dataset.category;
      renderProducts();
    });
    $("menuGrid").addEventListener("click", event => {
      const btn = event.target.closest("[data-item]");
      if (btn) addToCart(btn.dataset.item);
    });
    $("cartList").addEventListener("click", event => {
      const btn = event.target.closest("[data-qty]");
      if (btn) changeQty(btn.dataset.id, Number(btn.dataset.qty));
    });
    $("clearCart").addEventListener("click", () => { cart = []; renderCart(); renderProducts(); });
    $("placeOrder").addEventListener("click", placeOrder);
    $("profileBtn").addEventListener("click", () => {
      $("posMessage").textContent = `${user.name} | ${user.role} | ${API}`;
      $("posMessage").className = "status";
    });
    document.querySelectorAll("[data-pay]").forEach(btn => btn.addEventListener("click", () => {
      payment = btn.dataset.pay;
      document.querySelectorAll("[data-pay]").forEach(item => item.classList.toggle("active", item === btn));
      $("splitBox").classList.toggle("hidden", payment !== "Split");
      renderCart();
    }));
    $("splitCash").addEventListener("input", () => {
      const total = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      $("splitOnline").value = Math.max(0, total - Number($("splitCash").value || 0));
    });
    document.querySelectorAll("[data-admin-tab]").forEach(btn => btn.addEventListener("click", () => {
      adminTab = btn.dataset.adminTab;
      renderAdmin();
    }));
    window.addEventListener("online", syncPendingOrders);
    window.addEventListener("offline", () => {
      serverOnline = false;
      updateSyncStatus("Connect internet", "offline");
    });
    window.setInterval(syncPendingOrders, 15000);
    window.setInterval(checkServerConnection, 30000);

    user = readJson(sessionKey, null);
    if (user) enterApp();
    else {
      show("loginView");
      loadSettings();
    }
  </script>
</body>
</html>
