<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axzen Infotech POS</title>
  <style>
    :root {
      --ink: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --page: #f5f5f7;
      --panel: #ffffff;
      --navy: #101828;
      --blue: #007aff;
      --green: #22c55e;
      --green-dark: #2f7d26;
      --orange: #f59e0b;
      --red: #ef4444;
      --shadow: 0 18px 45px #11182714;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Arial, sans-serif;
    }

    button, input, select { font: inherit; }
    button { cursor: pointer; }

    .hidden { display: none !important; }

    .app {
      max-width: 1024px;
      min-height: 100vh;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 0 55px #11182714;
      overflow-x: hidden;
    }

    .login {
      min-height: 100vh;
      display: grid;
      align-content: center;
      gap: 24px;
      padding: 30px 20px;
      background: linear-gradient(160deg, #ffffff, #eef5ff 58%, #f8fafc);
    }

    .brand-lockup { text-align: center; }
    .powered { margin: 0 0 5px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .brand-name { margin: 0; font-size: 48px; line-height: .95; letter-spacing: 0; color: var(--ink); }
    .tagline { margin: 7px 0 0; color: var(--blue); font-size: 15px; font-weight: 900; text-transform: uppercase; }

    .login-card, .panel, .sheet {
      border: 1px solid #ffffff;
      border-radius: 18px;
      background: #ffffffdc;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .login-card { padding: 22px; display: grid; gap: 14px; }
    .login-card h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
    .login-card p { margin: -6px 0 4px; color: var(--muted); font-size: 14px; }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      border: 1px solid #dfe3eb;
      border-radius: 12px;
      padding: 13px 14px;
      background: #fbfcff;
      color: var(--ink);
      outline: none;
    }

    input:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 4px #007aff1c; background: white; }

    .primary, .secondary, .danger {
      min-height: 46px;
      border: 0;
      border-radius: 12px;
      font-weight: 900;
    }

    .primary { background: linear-gradient(180deg, #1684ff, #006de8); color: white; box-shadow: 0 12px 26px #007aff30; }
    .secondary { background: #f2f7ff; color: var(--blue); border: 1px solid #d7e8ff; }
    .danger { background: #fff5f5; color: var(--red); border: 1px solid #ffd9d9; }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      background: #fbfbfde8;
      border-bottom: 1px solid #e8edf4;
      backdrop-filter: blur(20px);
    }

    .title-block { min-width: 0; }
    .title-block strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 16px; }
    .title-block span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .connection-line {
      display: inline-flex !important;
      align-items: center;
      gap: 6px;
      min-height: 18px;
    }
    .net-badge {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      color: white;
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      box-shadow: 0 4px 10px #11182718;
    }
    .net-badge.online { background: var(--green); }
    .net-badge.online::before { content: "✓"; }
    .net-badge.offline { background: var(--red); }
    .net-badge.offline::before { content: "!"; }
    .net-badge.syncing { background: var(--orange); }
    .net-badge.syncing::before { content: "..."; font-size: 8px; }

    .icon-btn {
      width: 38px;
      height: 38px;
      border: 1px solid #e1e6ee;
      border-radius: 12px;
      background: white;
      color: var(--ink);
      font-weight: 900;
    }

    .content { padding: 14px 12px 292px; }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 13px;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid #e1e6ee;
      border-radius: 999px;
      padding: 10px 13px;
      background: white;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .tab.active { background: #111827; border-color: #111827; color: white; }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .item-card {
      position: relative;
      min-height: 178px;
      border: 1px solid #e8edf4;
      border-radius: 14px;
      background: white;
      box-shadow: 0 10px 24px #1118270d;
      display: grid;
      grid-template-rows: 112px auto auto;
      gap: 8px;
      padding: 8px;
      text-align: center;
      overflow: hidden;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    }
    .item-card:active { transform: scale(.97); }
    .item-card:hover { border-color: #cfe0f5; box-shadow: 0 14px 30px #11182714; }

    .item-icon {
      width: 100%;
      height: 112px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, #f0f7ff, #fff8e8);
      background-size: cover;
      background-position: center;
      font-size: 0;
      font-weight: 900;
      color: var(--blue);
      box-shadow: inset 0 1px 0 #fff;
    }
    .item-icon.initials { font-size: 13px; background: linear-gradient(145deg, #eef7ff, #fff8e8); }

    .item-card h3 { margin: 0; font-size: 18px; line-height: 1.12; overflow-wrap: anywhere; }
    .item-card p { margin: 0; color: var(--muted); font-size: 13px; font-weight: 900; }
    .count-badge {
      position: absolute;
      top: 6px;
      right: 8px;
      min-width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--red);
      color: white;
      border: 2px solid white;
      font-size: 14px;
      font-weight: 950;
      box-shadow: 0 8px 18px #ef444455;
    }
    .remove-badge {
      position: absolute;
      top: 6px;
      left: 8px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      border: 2px solid white;
      display: grid;
      place-items: center;
      background: #111827;
      color: white;
      font-size: 15px;
      font-weight: 950;
      box-shadow: 0 8px 18px #11182730;
    }

    .cart-sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 6;
      width: min(480px, 100%);
      transform: translateX(-50%);
      border-top: 1px solid #e8edf4;
      background: #fffffff2;
      box-shadow: 0 -18px 45px #11182718;
      backdrop-filter: blur(20px);
    }

    .cart-inner { padding: 13px; }
    .cart-head, .row-between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .cart-head strong { font-size: 14px; }
    .cart-head button { border: 0; background: transparent; color: var(--red); font-size: 12px; font-weight: 900; }

    .cart-list {
      display: grid;
      gap: 8px;
      max-height: 122px;
      overflow: auto;
      margin: 8px 0 10px;
    }

    .cart-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .cart-row small { display: block; margin-top: 2px; color: var(--muted); font-weight: 800; }
    .qty { display: grid; grid-template-columns: 28px 28px 28px; align-items: center; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; text-align: center; }
    .qty button { height: 28px; border: 0; background: #f3f6fb; color: var(--blue); font-weight: 900; }

    .pay-toggle { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .pay-toggle button { min-height: 40px; border: 1px solid var(--line); border-radius: 12px; background: white; font-weight: 900; }
    .pay-toggle button.active { background: var(--green); border-color: var(--green); color: white; }
    .split-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .split-box input { padding: 10px; border-radius: 10px; }

    .place { width: 100%; margin-top: 8px; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      align-items: end;
      justify-items: center;
      background: #11182766;
      backdrop-filter: blur(8px);
      padding: 16px;
    }
    .payment-modal {
      width: min(448px, 100%);
      border: 1px solid #e8edf4;
      border-radius: 18px;
      background: white;
      box-shadow: 0 24px 80px #11182740;
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .payment-modal h2 { margin: 0; font-size: 18px; }
    .modal-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .modal-x {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--ink);
      font-size: 18px;
      font-weight: 950;
    }
    .payment-total { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-radius: 12px; background: #f8fafc; font-weight: 950; }
    .payment-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .payment-actions button { min-height: 44px; border-radius: 12px; border: 1px solid var(--line); background: white; font-weight: 950; }
    .payment-actions button.primary-choice { background: var(--green); border-color: var(--green); color: white; }
    .payment-actions button.selected { background: var(--green); border-color: var(--green); color: white; box-shadow: 0 10px 22px #2f7d2633; }
    .modal-close { width: 100%; }
    .credit-box {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }
    .credit-box input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-weight: 850;
    }
    .option-actions { display: grid; gap: 10px; }
    .menu-list { display: grid; gap: 2px; }
    .menu-divider { height: 1px; margin: 6px 0; background: var(--line); }
    .menu-action {
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      background: white;
      color: var(--ink);
      text-align: left;
      padding: 0 10px;
      font-weight: 900;
    }
    .menu-action:active { background: #f2f7ff; }
    .option-card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f8fafc;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .option-card h3 { margin: 0; font-size: 15px; }
    .option-card input, .option-card select { width: 100%; padding: 11px; border: 1px solid var(--line); border-radius: 12px; font-weight: 850; }
    .option-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: 13px; font-weight: 850; }
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: stretch;
      background: #1118278f;
    }
    .side-drawer {
      width: min(82vw, 314px);
      max-width: 314px;
      min-height: 100vh;
      background: #fff;
      color: var(--ink);
      box-shadow: 24px 0 60px #11182738;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .drawer-scroll {
      overflow-y: auto;
      padding: 22px 14px 16px;
      display: grid;
      gap: 14px;
    }
    .drawer-brand {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
      align-items: center;
      padding: 0 4px;
    }
    .drawer-logo {
      width: 54px;
      height: 54px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #102653;
      color: white;
      font-size: 22px;
      font-weight: 950;
    }
    .drawer-title strong { display: block; font-size: 16px; }
    .drawer-title span {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      margin-top: 5px;
      padding: 0 11px;
      border-radius: 999px;
      background: #eef3ff;
      color: #1d3f77;
      font-size: 12px;
      font-weight: 950;
    }
    .drawer-connected {
      grid-column: 2;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: -7px;
      color: #34824a;
      font-size: 12px;
      font-weight: 900;
    }
    .drawer-connected::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #38a169;
    }
    .drawer-user {
      display: grid;
      grid-template-columns: 38px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 58px;
      border: 1px solid #e8edf4;
      border-radius: 12px;
      padding: 9px;
      box-shadow: 0 8px 24px #1118270a;
    }
    .drawer-user-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: #f1f5ff;
      color: #244c8f;
      font-weight: 950;
    }
    .drawer-user small,
    .drawer-section-title {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .drawer-user strong { display: block; font-size: 14px; }
    .drawer-online {
      padding: 7px 10px;
      border-radius: 999px;
      background: #eaf8ed;
      color: #2f7d26;
      font-size: 12px;
      font-weight: 950;
    }
    .drawer-section {
      display: grid;
      gap: 5px;
      padding-top: 4px;
      border-top: 1px solid #eef1f5;
    }
    .drawer-section:first-of-type { border-top: 0; }
    .drawer-item {
      width: 100%;
      min-height: 42px;
      display: grid;
      grid-template-columns: 28px 1fr 18px;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      padding: 0 8px;
      font-size: 14px;
      font-weight: 900;
    }
    .drawer-item.active {
      background: linear-gradient(90deg, #102653, #2f72d8);
      color: white;
      box-shadow: 0 12px 22px #1f5fb633;
    }
    .drawer-item.soft-active {
      background: #eef5ff;
      color: #1d4e91;
    }
    .drawer-item .drawer-arrow { color: #94a3b8; font-size: 20px; }
    .drawer-item.active .drawer-arrow { color: white; }
    .drawer-footer {
      border-top: 1px solid #eef1f5;
      padding: 12px 14px 18px;
      display: grid;
      gap: 10px;
      background: #fff;
    }
    .drawer-logout {
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #c2414b;
      text-align: left;
      padding: 0 10px;
      font-weight: 950;
    }
    .drawer-version {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      padding: 0 10px;
    }
    .drawer-detail {
      width: min(420px, calc(100vw - min(82vw, 314px)));
      max-height: calc(100vh - 32px);
      margin: 16px;
      overflow-y: auto;
      align-self: flex-start;
      display: grid;
      gap: 10px;
    }
    .drawer-detail:empty { display: none; }
    .drawer-close-zone { flex: 1; min-width: 20px; }
    .drawer-close-zone {
      border: 0;
      background: transparent;
      min-height: 100vh;
    }
    @media (max-width: 640px) {
      .side-drawer { width: min(86vw, 330px); }
      .drawer-detail { display: none; }
    }
    .bill-action {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      padding: 8px;
      text-align: left;
      font-weight: 850;
    }
    .bill-row { display: grid; grid-template-columns: 1fr 46px; gap: 8px; align-items: stretch; }
    .bill-print { border: 1px solid var(--line); border-radius: 10px; background: white; font-size: 19px; }
    .variant-list { display: grid; gap: 8px; }
    .variant-choice { display: flex; justify-content: space-between; align-items: center; min-height: 48px; border: 1px solid var(--line); border-radius: 12px; background: #fbfcff; padding: 0 12px; font-weight: 950; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 7;
      width: min(480px, 100%);
      transform: translateX(-50%);
      display: none;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
      background: white;
    }

    .bottom-nav.user-nav { bottom: 254px; }
    .bottom-nav button { min-height: 56px; border: 0; background: white; color: var(--muted); font-size: 11px; font-weight: 900; }
    .bottom-nav button.active { color: var(--blue); }

    .admin-shell { min-height: 100vh; background: var(--page); }
    .admin-hero {
      padding: 18px 14px;
      background: linear-gradient(145deg, #111827, #172033);
      color: white;
    }
    .admin-hero .brand-name { color: white; font-size: 34px; }
    .admin-hero .tagline { color: #8ec5ff; }

    .admin-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; }
    .admin-tabs button { min-height: 42px; border: 1px solid var(--line); border-radius: 12px; background: white; color: var(--ink); font-size: 12px; font-weight: 900; }
    .admin-tabs button.active { background: var(--blue); color: white; border-color: var(--blue); }
    .admin-page { padding: 0 12px 22px; display: grid; gap: 12px; }

    .kpis { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .kpi { padding: 14px; border: 1px solid #e8edf4; border-radius: 16px; background: white; box-shadow: 0 10px 26px #1118270d; }
    .kpi span { color: var(--muted); font-size: 12px; font-weight: 900; }
    .kpi strong { display: block; margin-top: 8px; font-size: 22px; }

    .panel { padding: 14px; }
    .panel h2 { margin: 0 0 12px; font-size: 17px; }
    .panel-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .panel-head h2 { margin: 0; }
    .stack { display: grid; gap: 10px; }
    .order-line, .user-line { display: grid; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--line); }
    .order-line:last-child, .user-line:last-child { border-bottom: 0; }
    .order-line.with-action { grid-template-columns: 1fr auto; align-items: center; gap: 10px; }
    .mini-danger { min-height: 34px; border: 1px solid #ffd9d9; border-radius: 10px; background: #fff5f5; color: var(--red); padding: 0 10px; font-size: 12px; font-weight: 950; }
    .muted { color: var(--muted); font-size: 12px; font-weight: 800; }

    .form-grid { display: grid; gap: 10px; }
    .option-page {
      display: grid;
      gap: 16px;
      min-height: 420px;
    }
    .work-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 18px;
      border: 1px solid #e8edf4;
      border-radius: 14px;
      background: linear-gradient(135deg, #ffffff, #f4f8ff);
      box-shadow: 0 12px 28px #1118270d;
    }
    .work-header h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }
    .work-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 750;
    }
    .work-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .work-card {
      border: 1px solid #e8edf4;
      border-radius: 12px;
      background: white;
      padding: 16px;
      box-shadow: 0 12px 28px #1118270d;
    }
    .work-card h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .metric-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .metric-card strong {
      display: block;
      margin-top: 8px;
      font-size: 26px;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th {
      color: var(--muted);
      font-size: 12px;
      text-align: left;
      text-transform: uppercase;
      padding: 0 8px 10px;
    }
    .data-table td {
      border-top: 1px solid #eef1f5;
      padding: 12px 8px;
      font-weight: 850;
      vertical-align: middle;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 10px;

    /* POS visual style matching the supplied mobile mockup. */

<body>
  <main class="app">
    <section class="login" id="loginView">
      <div class="brand-lockup">
        <p class="powered">Powered by</p>
        <h1 class="brand-name">Axzen</h1>
        <p class="tagline">Infotech</p>
      </div>
      <form class="login-card" id="loginForm">
        <h1>Sign in</h1>
        <p id="loginCanteen">Main Canteen</p>
        <label>Mobile number <input id="mobileInput" autocomplete="username" required></label>
        <label>Password <input id="passwordInput" type="password" autocomplete="current-password" required></label>
        <button class="primary" type="submit">Login</button>
        <button class="secondary" type="button" id="testServerBtn">Test Server</button>

    </section>

    <section id="posView" class="hidden">
      <header class="topbar">
        <button class="icon-btn" id="logoutPos" type="button">☰</button>
        <div class="brand-mark">🍴</div>
        <div class="title-block">
          <strong><span id="posCanteen">Axzen Canteen</span><span class="counter-pill">Counter 01</span></strong>
          <span class="shift-line"><span class="connection-pill"><span class="net-badge offline" id="connectionBadge"></span><b id="syncStatus">Online</b></span><span class="date-part">7 May 2025, Wed</span><span class="shift-part">Morning Shift</span></span>
        </div>
        <div class="top-actions-pos">
          <button class="icon-btn" type="button" aria-label="Notifications">!</button>

        </div>
      </header>
      <section class="content">
        <div id="billingPanel">
          <div class="search-row">
            <label class="search-box" aria-label="Search for items">
              <span>⌕</span>
              <input id="itemSearch" placeholder="Search item by name / code">
            </label>
            <button class="filter-btn sale-btn" id="todaySaleBtn" type="button">Today's Sale</button>
            <button class="filter-btn" id="filterBtn" type="button">Orders</button>
          </div>
          <div class="tabs" id="categoryTabs"></div>
          <div class="menu-grid" id="menuGrid"></div>
        </div>
        <div class="option-page hidden" id="optionPage"></div>
      </section>
      <nav class="bottom-nav user-nav" id="userNav">
        <button class="active">Home</button>
        <button>Orders</button>
        <button>Reports</button>
        <button>Settings</button>
      </nav>
      <section class="cart-sheet">
        <div class="cart-inner">
          <div class="cart-head">
            <div class="cart-title-wrap">
              <span class="cart-icon">🛒</span>

            </div>

          <div class="cart-summary">
            <div class="row-between"><span>Subtotal</span><strong id="cartSubtotal">Rs 0</strong></div>
            <div class="row-between green"><span>Discount</span><strong>- Rs 0</strong></div>
            <div class="row-between"><span>GST (0%)</span><strong>Rs 0</strong></div>
          </div>
          <div class="row-between">
            <strong>Total Amount</strong>
            <strong id="cartTotal">Rs 0</strong>
          </div>
          <button class="primary place" id="placeOrder">Proceed to Payment -></button>
          <div class="status" id="posMessage"></div>
        </div>
      </section>
    </section>

    <section id="adminView" class="admin-shell hidden">
      <div class="admin-hero">
        <div class="brand-lockup">
          <p class="powered">Powered by</p>
          <h1 class="brand-name">Axzen</h1>
          <p class="tagline">Infotech</p>
        </div>
        <div class="row-between" style="margin-top:16px">
          <div>
            <strong id="adminCanteen">Main Canteen</strong>
            <div class="muted" id="adminRole">Admin Panel</div>
          </div>
          <button class="icon-btn" id="logoutAdmin">X</button>
        </div>
      </div>
      <div class="admin-tabs">
        <button class="active" data-admin-tab="dashboard">Home</button>
        <button data-admin-tab="users">Users</button>
        <button data-admin-tab="orders">Sales</button>
        <button data-admin-tab="settings">Settings</button>
      </div>
      <section class="admin-page" id="adminPage"></section>
    </section>
    <div id="paymentModalMount"></div>
    <div id="optionsModalMount"></div>
  </main>

  <script>
    const apiParam = new URLSearchParams(window.location.search).get("api");
    const hasApiOverride = Boolean(apiParam);
    if (apiParam) localStorage.setItem("AXEN_API_URL", apiParam);
    const liveApi = "https://canteen.axzen.in";
    const browserHost = window.location.hostname && window.location.hostname !== "localhost"
      ? window.location.hostname
      : "localhost";
    const nativeHost = window.Capacitor ? "192.168.29.115" : browserHost;
    const storedApi = localStorage.getItem("AXEN_API_URL");
    const storedApiIsLocal = storedApi && /localhost|127\.0\.0\.1|10\.0\.2\.2|192\.168\.|http:\/\/10\.|http:\/\/172\.(1[6-9]|2\d|3[0-1])\./.test(storedApi);
    const productionApi = !window.Capacitor && window.location.protocol === "https:" ? window.location.origin : "";
    const API = window.Capacitor && (!hasApiOverride || !storedApi || storedApiIsLocal)
      ? liveApi
      : productionApi
      ? productionApi
      : (storedApi || `http://${nativeHost}:5000`);

    const categoryOrder = ["All", "Meals", "Tiffin", "Tea", "Drinks", "Snacks", "Lunch", "Juice", "Dinner"];
    const appBuild = "1.7.0";
    const appBuildKey = "AXEN_APP_BUILD";
    const productCacheKey = "AXEN_PRODUCTS";
    const pendingOrdersKey = "AXEN_PENDING_ORDERS";
    const heldOrdersKey = "AXEN_HELD_ORDERS";
    const sessionKey = "AXEN_SESSION";
    const tokenKey = "AXEN_TOKEN";
    const loginCacheKey = "AXEN_LOGIN_CACHE";
    const selectedPrinterKey = "AXEN_SELECTED_PRINTER";
    let settings = { canteenName: "Main Canteen", brandName: "Axzen", tagline: "Infotech" };
    let user = null;
    let products = [];
    let orders = [];
    let users = [];
    let activeCategory = "All";
    let cart = [];
    let payment = "";
    let itemSearch = "";
    let cartDiscount = 0;
    let adminTab = "dashboard";
    let activePosSection = "billing";
    let serverOnline = navigator.onLine;
    let adminUnlocked = false;
    let selectedPrinter = localStorage.getItem(selectedPrinterKey) || "";
    let longPressTimer = null;
    let longPressHandled = false;

    const $ = id => document.getElementById(id);
    const money = value => "Rs " + Number(value || 0).toFixed(0);
    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    const readJson = (key, fallback) => {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; }
    };
    const writeJson = (key, value) => localStorage.setItem(key, JSON.stringify(value));
    const pendingOrders = () => readJson(pendingOrdersKey, []);
    const setPendingOrders = value => { writeJson(pendingOrdersKey, value); updateSyncStatus(); };

    if (localStorage.getItem(appBuildKey) !== appBuild) {
      localStorage.removeItem(productCacheKey);
      localStorage.setItem(appBuildKey, appBuild);
    }

    function setConnectionState(state, text) {
      const badge = $("connectionBadge");
      if (badge) badge.className = `net-badge ${state}`;
      if ($("syncStatus")) $("syncStatus").textContent = text;
      if ($("profileBtn")) {
        $("profileBtn").classList.toggle("online", state === "online");
        $("profileBtn").classList.toggle("offline", state !== "online");
      }
    }

    function categoryIcon(category) {
      return ({ All: "▦", Tiffin: "▤", Meals: "🍽", Tea: "☕", Snacks: "△", Juice: "🥤", Drinks: "🥤", Lunch: "🍛", Dinner: "🍽" })[category] || "□";
    }

    function categoryLabel(category) {
      return ({ Tiffin: "Tiffins", Lunch: "Rice" })[category] || category;
    }

    function itemEmoji(item) {
      const name = String(item.name || "").toLowerCase();
      if (name.includes("tea")) return "☕";
      if (name.includes("coffee")) return "☕";
      if (name.includes("meals")) return "🍽";
      if (name.includes("idly") || name.includes("idli")) return "🟠";
      if (name.includes("dosa")) return "🥞";
      if (name.includes("samosa")) return "△";
      if (name.includes("juice")) return "🥤";
      return categoryIcon(item.category || "All");
    }

    function itemSubtitle(item) {
      const name = String(item.name || "").toLowerCase();
      if (name.includes("tea")) return "Fresh & Strong";
      if (name.includes("coffee")) return "Hot & Aromatic";
      if (name.includes("meals")) return "Healthy & Delicious";
      if (name.includes("idly") || name.includes("idli")) return "Soft & Fluffy";
      if (name.includes("dosa")) return "Crispy & Tasty";
      if (name.includes("samosa")) return "Hot & Crunchy";
      return item.category || "Fresh Item";
    }

    async function api(path, options = {}) {
      const token = localStorage.getItem(tokenKey);
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 5000);
      const response = await fetch(API + path, {
        ...options,
        signal: controller.signal,
        headers: {
          "Content-Type": "application/json",
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...(options.headers || {})
        }
      }).finally(() => clearTimeout(timeout));
      if (!response.ok) throw new Error("Request failed");
      return response.json();
    }

    function applySettings(next = {}) {
      settings = { ...settings, ...next };
      $("loginCanteen").textContent = settings.canteenName;
      $("posCanteen").textContent = settings.canteenName;
      $("adminCanteen").textContent = settings.canteenName;
    }

    function renderUserChrome() {
      if ($("posUserLabel")) $("posUserLabel").textContent = user?.name || "User";
      const avatar = document.querySelector(".avatar-chip");
      if (avatar) avatar.textContent = String(user?.name || "U").slice(0, 1).toUpperCase();
    }

    function show(view) {
      ["loginView", "posView", "adminView"].forEach(id => $(id).classList.add("hidden"));
      $(view).classList.remove("hidden");
    }

    function setSession(nextUser, token) {
      user = nextUser;
      writeJson(sessionKey, user);
      if (token) localStorage.setItem(tokenKey, token);
      renderUserChrome();
    }

    function cacheLogin(mobile, password, nextUser) {
      const cache = readJson(loginCacheKey, {});
      cache[String(mobile).trim()] = {
        password: String(password),
        user: nextUser,
        savedAt: new Date().toISOString()
      };
      writeJson(loginCacheKey, cache);
    }

    function offlineLogin(mobile, password) {
      const cache = readJson(loginCacheKey, {});
      const saved = cache[String(mobile).trim()];
      if (!saved || String(saved.password) !== String(password)) return null;
      return saved.user;
    }

    function logout() {
      localStorage.removeItem(sessionKey);
      localStorage.removeItem(tokenKey);
      user = null;
      cart = [];
      adminUnlocked = false;
      show("loginView");
    }

    function updateSyncStatus(text, state) {
      const count = pendingOrders().length;
      if (!$("syncStatus")) return;
      if (state) return setConnectionState(state, text || "");
      if (!navigator.onLine || !serverOnline) return setConnectionState("offline", "Connect internet");
      if (count) return setConnectionState("syncing", text || `${count} pending sync`);
      setConnectionState("online", text || "Connected");
    }

    async function checkServerConnection() {
      if (!navigator.onLine) {
        serverOnline = false;
        updateSyncStatus("Connect internet", "offline");
        return false;
      }

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3500);
      try {
        const response = await fetch(API + "/health", {
          cache: "no-store",
          signal: controller.signal
        });
        serverOnline = response.ok;
      } catch {
        serverOnline = false;
      } finally {
        clearTimeout(timeout);
      }

      updateSyncStatus(serverOnline ? undefined : "Connect internet", serverOnline ? undefined : "offline");
      return serverOnline;
    }

      const suffix = option && option.name ? String(option.name).toLowerCase().replace(/[^a-z0-9]+/g, "-") : "base";
      return `${product.id}:${suffix}`;

    function cartQty(id) {
      return cart
        .filter(row => Number(row.parentId || row.id) === Number(id))
        .reduce((sum, item) => sum + Number(item.qty || 0), 0);
    }

    function addToCart(id, option = null) {
      const product = products.find(item => Number(item.id) === Number(id));
      if (!product) return;
      const lineId = cartLineId(product, option);
      const existing = cart.find(item => item.lineId === lineId);
      if (existing) existing.qty += 1;
      else cart.push({
        ...product,
        lineId,
        parentId: Number(product.id),
        optionName: option && option.name ? option.name : "",
        name: option && option.name ? `${product.name} - ${option.name}` : product.name,
        price: option && option.name ? Number(option.price || 0) : Number(product.price || 0),
        qty: 1
      });
      renderCart();
      renderProducts();
    }

    function changeQty(id, amount) {
      cart = cart.map(item => item.lineId === id ? { ...item, qty: item.qty + amount } : item).filter(item => item.qty > 0);

      renderProducts();
    }

    function removeFromCart(id) {

      const subtotal = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      cartDiscount = Math.min(subtotal, Math.max(0, Number(cartDiscount || 0)));
      const total = Math.max(0, subtotal - cartDiscount);
      const qty = cart.reduce((sum, item) => sum + item.qty, 0);
      $("cartTitle").textContent = `Cart (${cart.reduce((sum, item) => sum + item.qty, 0)} items)`;
      $("cartSubtitle").textContent = qty ? cart.map(item => `${item.name} x ${item.qty}`).join(", ") : "Cart empty";
      if ($("cartSubtotal")) $("cartSubtotal").textContent = money(subtotal);
      const discountNode = document.querySelector(".cart-summary .green strong");
      if (discountNode) discountNode.textContent = `- ${money(cartDiscount)}`;
      $("cartTotal").textContent = money(total);
      $("cartList").innerHTML = cart.map(item => `
        <div class="cart-row">
          <span class="cart-thumb" style="${item.image ? `background-image:url('${String(item.image).replace(/'/g, "%27")}')` : ""}"></span>

        const online = Math.max(0, Number(onlineInput ? onlineInput.value : total - cash));
        return { cash, online, credit: 0 };

      if (selectedPayment === "Credit") return { cash: 0, online: 0, credit: total };
      if (selectedPayment === "Cancel") return { cash: 0, online: 0, credit: 0 };

        $("posMessage").textContent = "Cart empty. Discount apply cheyyadaniki items add cheyyandi.";
        $("posMessage").className = "status error";
        return;
      }
      const subtotal = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      const raw = prompt("Discount amount enter cheyyandi", String(cartDiscount || 0));
      if (raw === null) return;
      cartDiscount = Math.min(subtotal, Math.max(0, Number(raw || 0)));
      renderCart();
      $("posMessage").textContent = cartDiscount ? `Discount applied: ${money(cartDiscount)}` : "Discount cleared";
      $("posMessage").className = "status ok";
    }

    async function syncPendingOrders() {
      const pending = pendingOrders();
      const connected = await checkServerConnection();
      if (!pending.length) return updateSyncStatus();
      if (!connected) return updateSyncStatus("Connect internet", "offline");
      try {
        updateSyncStatus("Syncing...", "syncing");
        const data = await api("/orders/sync", { method: "POST", body: JSON.stringify({ orders: pending }) });
        const synced = new Set(data.synced || []);
        setPendingOrders(pending.filter(order => !synced.has(order.clientOrderId) && !synced.has(order.id)));
      } catch {
        serverOnline = false;
        updateSyncStatus("Connect internet", "offline");
      }
    }

    async function completeOrder(selectedPayment) {
      if (!cart.length) return closePaymentModal();
      const orderSubtotal = cart.reduce((sum, item) => sum + Number(item.price) * item.qty, 0);
      cartDiscount = Math.min(orderSubtotal, Math.max(0, Number(cartDiscount || 0)));
      const orderTotal = Math.max(0, orderSubtotal - cartDiscount);
      const creditInput = $("creditNameInput");
      const creditName = selectedPayment === "Credit" ? String((creditInput && creditInput.value) || "").trim() : "";
      if (selectedPayment === "Credit" && !creditName) {
        setPaymentStatus("Credit name select or type cheyyandi", "status error");
        return;
      }
      payment = selectedPayment;
      const payload = {
        id: Date.now(),
        clientOrderId: "mobile-" + Date.now() + "-" + Math.random().toString(16).slice(2),
        time: new Date().toLocaleString(),
        canteen: settings.canteenName,
        cashier: user.name,
        payment: selectedPayment,
        paymentBreakup: paymentBreakup(orderTotal, selectedPayment),
        creditName,
        subtotal: orderSubtotal,
        discount: cartDiscount,
        total: orderTotal,
        items: cart.map(item => ({
          id: item.id,
          lineId: item.lineId,
          parentId: item.parentId || item.id,
          name: item.name,
          optionName: item.optionName || "",
          price: item.price,
          qty: item.qty
        }))
      };
      if (selectedPayment === "Split" && Math.round((payload.paymentBreakup.cash + payload.paymentBreakup.online) * 100) !== Math.round(payload.total * 100)) {
        setPaymentStatus(`Split amount must equal ${money(payload.total)}`, "status error");
        return;
      }
      if (selectedPayment === "Cancel") payload.total = 0;
      setPaymentStatus("Printing receipt...");
      await receipt(payload);
      setPaymentStatus("Receipt sent. Saving order...");

      try {
        const saved = await api("/orders", { method: "POST", body: JSON.stringify(payload) });
        serverOnline = true;
        updateSyncStatus();
        $("posMessage").textContent = "Order saved";
        $("posMessage").className = "status ok";
      } catch {
        serverOnline = false;
        setPendingOrders([...pendingOrders(), payload]);
        $("posMessage").textContent = "Offline saved. Auto sync pending.";
        $("posMessage").className = "status ok";
      }

      setPaymentStatus("Success", "status ok");
      cart = [];
      cartDiscount = 0;
      payment = "";
      renderCart();
      renderProducts();
      await loadAdminData();
      setTimeout(closePaymentModal, 650);
    }

    function dashboardStats() {
      const total = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
      const paid = orders.reduce((sum, order) => {
        const pay = orderBreakup(order);
        sum.cash += pay.cash;
        sum.online += pay.online;
        sum.credit += pay.credit;
        return sum;
      }, { cash: 0, online: 0, credit: 0 });
      return { total, cash: paid.cash, online: paid.online, credit: paid.credit, count: orders.length };
    }

    function renderAdmin() {
      const stats = dashboardStats();
      const page = $("adminPage");
      document.querySelectorAll("[data-admin-tab]").forEach(btn => btn.classList.toggle("active", btn.dataset.adminTab === adminTab));

      if (adminTab === "dashboard") {
        page.innerHTML = `
          <div class="kpis">
            <div class="kpi"><span>Today Sale</span><strong>${money(stats.total)}</strong></div>
            <div class="kpi"><span>Total Orders</span><strong>${stats.count}</strong></div>
            <div class="kpi"><span>Cash</span><strong>${money(stats.cash)}</strong></div>
            <div class="kpi"><span>Online</span><strong>${money(stats.online)}</strong></div>
          </div>
          <div class="panel"><h2>Work Flow</h2><div class="muted">Admin creates users -> User login -> Select item -> Place order -> Sale recorded -> Sync report</div></div>
          <div class="panel"><h2>Top Items</h2>${topItemsHtml()}</div>
        `;
      } else if (adminTab === "orders") {
        page.innerHTML = `<div class="panel">
          <div class="panel-head">
            <h2>Recent Sales</h2>
            ${orders.length ? `<button class="mini-danger" id="deleteAllBills" type="button">Delete All</button>` : ""}
          </div>
          ${orders.slice().reverse().map(order => {
            const orderId = order.clientOrderId || order.id;
            return `
              <div class="order-line with-action">
                <div><strong>${order.canteen || settings.canteenName} - ${money(order.total)}</strong><span class="muted">${order.time} | ${order.payment} | ${order.cashier || "-"}</span></div>
                <button class="mini-danger" data-delete-bill="${orderId}" type="button">Delete</button>
              </div>`;
          }).join("") || `<div class="muted">No orders</div>`}
        </div>`;
        document.querySelectorAll("[data-delete-bill]").forEach(btn => btn.addEventListener("click", () => deleteBill(btn.dataset.deleteBill)));
        if ($("deleteAllBills")) $("deleteAllBills").addEventListener("click", deleteAllBills);
      } else if (adminTab === "users") {
        page.innerHTML = `
          <div class="panel">
            <h2>Create User</h2>
            <form class="form-grid" id="userForm">
              <input id="newName" placeholder="Name" required>
              <input id="newMobile" placeholder="Mobile number" required>
              <input id="newPassword" placeholder="Password" required>
              <select id="newRole"><option value="user">User</option><option value="admin">Admin</option></select>
              <button class="primary">Save User</button>
            </form>
          </div>
          <div class="panel"><h2>Users</h2>${users.map(item => `
            <div class="user-line"><strong>${item.name}</strong><span class="muted">${item.mobile} | ${item.role}</span></div>
          `).join("")}</div>
        `;
        $("userForm").addEventListener("submit", saveUser);
      } else {
        page.innerHTML = `
          <div class="panel">
            <h2>Settings</h2>
            <form class="form-grid" id="settingsForm">
              <label>Canteen name <input id="canteenNameInput" value="${settings.canteenName}"></label>
              <label>Server URL <input id="apiInput" value="${API}"></label>
              <button class="primary">Save Settings</button>
            </form>
          </div>
        `;
        $("settingsForm").addEventListener("submit", saveSettings);
      }
    }

    async function deleteBill(orderId) {
      if (!confirm("Ee bill delete cheyyala?")) return;
      try {
        await api(`/orders/${encodeURIComponent(orderId)}`, { method: "DELETE" });
        orders = orders.filter(order => String(order.clientOrderId || order.id) !== String(orderId));
        renderAdmin();
      } catch {
        alert("Bill delete failed. Internet/server check cheyyandi.");
      }
    }

    async function deleteAllBills() {
      if (!confirm("All bills delete cheyyala? Reports total kuda clear avuthayi.")) return;
      try {
        await api("/orders", { method: "DELETE" });
        orders = [];
        renderAdmin();
      } catch {
        alert("Bills delete failed. Internet/server check cheyyandi.");
      }
    }

    function topItemsHtml() {
      const counts = new Map();
      orders.forEach(order => (order.items || []).forEach(item => {
        counts.set(item.name, (counts.get(item.name) || 0) + Number(item.qty || 0));
      }));
      return [...counts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5).map(([name, qty]) =>
        `<div class="row-between" style="padding:8px 0;border-bottom:1px solid var(--line)"><strong>${name}</strong><span>${qty}</span></div>`
      ).join("") || `<div class="muted">No sales yet</div>`;
    }

    async function saveUser(event) {
      event.preventDefault();
      await api("/users", {
        method: "POST",
        body: JSON.stringify({
          name: $("newName").value,
          mobile: $("newMobile").value,
          password: $("newPassword").value,
          role: $("newRole").value
        })
      });
      await loadAdminData();
    }

    async function saveSettings(event) {
      event.preventDefault();
      const nextApi = $("apiInput").value.trim().replace(/\/$/, "");
      if (nextApi) localStorage.setItem("AXEN_API_URL", nextApi);
      const data = await api("/settings", {
        method: "POST",
        body: JSON.stringify({ canteenName: $("canteenNameInput").value.trim() || "Main Canteen" })
      });
      applySettings(data.settings);
      await loadAdminData();
    }

    async function login(event) {
      event.preventDefault();
      const mobile = $("mobileInput").value;
      const password = $("passwordInput").value;
      $("loginStatus").textContent = "Checking...";
      $("loginStatus").className = "status";
      try {
        const data = await api("/login", {
          method: "POST",
          body: JSON.stringify({ mobile, password })
        });
        setSession(data.user, data.token);
        cacheLogin(mobile, password, data.user);
        applySettings(data.settings);
        await enterApp();
      } catch (error) {
        const cachedUser = offlineLogin(mobile, password);
        if (cachedUser) {
          setSession(cachedUser);
          $("loginStatus").textContent = "Offline login success. Sync pending when internet returns.";
          $("loginStatus").className = "status ok";
          await enterApp();
          return;
        }

        $("loginStatus").textContent = `Login failed via ${API}. Tap Test Server.`;
        $("loginStatus").className = "status error";
      }
    }

    async function enterApp() {
      if (!user) return show("loginView");
      renderUserChrome();
      if (user.role === "admin") {
        $("adminRole").textContent = `${user.name} | Admin`;
        show("adminView");
        updateSyncStatus();
        await loadSettings();
        await loadAdminData();
        await syncPendingOrders();
      } else {
        show("posView");
        renderCart();
        updateSyncStatus();
        await loadSettings();
        await loadProducts();
        await loadAdminData();
        await syncPendingOrders();
        setPosSection(activePosSection);
      }
    }

    $("loginForm").addEventListener("submit", login);
    $("testServerBtn").addEventListener("click", testServerFromLogin);
    $("logoutPos").addEventListener("click", openMainMenu);
    $("logoutAdmin").addEventListener("click", logout);
    $("itemSearch").addEventListener("input", event => {
      itemSearch = event.target.value;
      renderProducts();
    });
    $("filterBtn").addEventListener("click", () => {
      setPosSection("held");
    });
    if ($("todaySaleBtn")) $("todaySaleBtn").addEventListener("click", () => setPosSection("report"));
    $("userNav").addEventListener("click", event => {
      const label = String(event.target.textContent || "").trim();
      document.querySelectorAll("#userNav button").forEach(btn => btn.classList.toggle("active", btn === event.target));
      if (label === "Home") {
        setPosSection("billing");
      }
      if (label === "Orders") setPosSection("held");
      if (label === "Reports") setPosSection("report");
      if (label === "Settings") setPosSection("settings");
    });
    $("categoryTabs").addEventListener("click", event => {
      const btn = event.target.closest("[data-category]");
      if (!btn) return;
      activeCategory = btn.dataset.category;
      renderProducts();
    });
    $("menuGrid").addEventListener("click", event => {
      const removeBtn = event.target.closest("[data-remove-item]");
      if (removeBtn) {
        event.stopPropagation();
        removeFromCart(removeBtn.dataset.removeItem);
        return;
      }
      if (longPressHandled) {
        event.preventDefault();
        longPressHandled = false;
        return;
      }
      const btn = event.target.closest("[data-item]");
      if (btn) addToCart(btn.dataset.item);
    });
    $("menuGrid").addEventListener("pointerdown", event => {
      const btn = event.target.closest("[data-item]");
      if (!btn) return;
      const product = products.find(item => Number(item.id) === Number(btn.dataset.item));
      if (!productSubItems(product).length) return;
      clearTimeout(longPressTimer);
      longPressTimer = setTimeout(() => {
        longPressHandled = true;
        openSubItemModal(product);
      }, 520);
    });
    ["pointerup", "pointercancel", "pointerleave"].forEach(name => $("menuGrid").addEventListener(name, () => {
      clearTimeout(longPressTimer);
    }));
    $("cartList").addEventListener("click", event => {
      const removeLine = event.target.closest("[data-remove-line]");
      if (removeLine) {
        removeCartLine(removeLine.dataset.removeLine);
        return;
      }
      const btn = event.target.closest("[data-qty]");
      if (btn) changeQty(btn.dataset.id, Number(btn.dataset.qty));
    });
    $("clearCart").addEventListener("click", () => { cart = []; cartDiscount = 0; renderCart(); renderProducts(); });
    $("placeOrder").addEventListener("click", placeOrderFlow);
    $("profileBtn").addEventListener("click", openMainMenu);
    document.querySelectorAll("[data-admin-tab]").forEach(btn => btn.addEventListener("click", () => {
      adminTab = btn.dataset.adminTab;
      renderAdmin();
    }));
    window.addEventListener("online", syncPendingOrders);
    window.addEventListener("offline", () => {
      serverOnline = false;
      updateSyncStatus("Connect internet", "offline");
    });
    window.setInterval(syncPendingOrders, 15000);
    window.setInterval(checkServerConnection, 30000);
    window.setInterval(() => {
      if (user && !$("posView").classList.contains("hidden")) wakePrinter();
    }, 45000);

    user = readJson(sessionKey, null);
    if (user) enterApp();
    else {
      show("loginView");
      $("loginStatus").textContent = `Admin default: admin / 1234 | API: ${API}`;
      loadSettings();
    }
  </script>
</body>
</html>
