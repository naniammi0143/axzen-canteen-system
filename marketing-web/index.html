<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>axzen Marketing Console</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --ink: #111827;
      --muted: #667085;
      --line: #e6ebf2;
      --page: #f6f8fb;
      --panel: #ffffff;
      --navy: #082653;
      --blue: #2563eb;
      --green: #16a34a;
      --orange: #f59e0b;
      --red: #dc2626;
      --teal: #0f766e;
      --shadow: 0 12px 32px #11182710;
    }
    * { box-sizing: border-box; }
    html {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--page);
      color: var(--ink);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0;
    }
    h1, h2, h3 { margin: 0; font-weight: 700; line-height: 1.25; letter-spacing: 0; }
    p { line-height: 1.5; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }
    .login {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #162b55 0, #0b1f3f 38%, #f6f8fb 39%, #eef5f3 100%);
    }
    .login-card {
      width: min(440px, 100%);
      display: grid;
      gap: 16px;
      padding: 30px;
      border: 1px solid #fff;
      border-radius: 22px;
      background: #ffffffed;
      box-shadow: 0 24px 70px #11182717;
    }
    .brand { display: grid; gap: 8px; text-align: center; padding: 8px 0 4px; }
    .brand h1 { color: var(--navy); font-size: 32px; font-weight: 700; line-height: 1.2; }
    .brand p { margin: 0; color: var(--muted); font-size: 13px; font-weight: 500; line-height: 1.5; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 12px; font-weight: 600; line-height: 1.35; text-transform: uppercase; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      padding: 12px;
      background: #fbfcff;
      outline: none;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); box-shadow: 0 0 0 4px #2563eb18; background: white; }
    .primary, .secondary, .danger, .ghost {
      min-height: 40px;
      border-radius: 8px;
      border: 0;
      padding: 0 13px;
      font-weight: 600;
    }
    .primary { background: var(--blue); color: white; box-shadow: 0 10px 22px #2563eb28; }
    .secondary { background: #ecfdf5; color: var(--green); border: 1px solid #bbf7d0; }
    .danger { background: #fff1f2; color: var(--red); border: 1px solid #fecdd3; }
    .ghost { background: white; color: var(--ink); border: 1px solid var(--line); }
    .status { min-height: 20px; color: var(--muted); font-size: 13px; font-weight: 500; line-height: 1.5; }
    .status.error { color: var(--red); }
    .status.ok { color: var(--green); }
    .shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 22px 16px;
      background: #0b1f3f;
      color: white;
    }
    .side-brand strong { display: block; font-size: 16px; font-weight: 700; line-height: 1.35; letter-spacing: 0; }
    .side-brand span, .profile span { color: #b7c3d8; font-size: 12px; font-weight: 500; line-height: 1.45; }
    .profile strong { display: block; margin-bottom: 2px; font-size: 14px; line-height: 20px; font-weight: 600; }
    .profile span { display: block; }
    .profile {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 11px;
      align-items: center;
      padding: 12px;
      border-radius: 8px;
      background: #ffffff10;
      border: 1px solid #ffffff18;
    }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; background: white; color: var(--navy); font-weight: 700; }
    nav { display: grid; gap: 6px; }
    nav button {
      min-height: 42px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #dbe6f5;
      text-align: left;
      padding: 0 12px;
      font-size: 13px;
      line-height: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-ico { width: 18px; height: 18px; flex: 0 0 18px; color: currentColor; opacity: .95; }
    .nav-ico svg { width: 100%; height: 100%; display: block; stroke: currentColor; }
    nav button span { display: block; }
    nav button small { display: none; }
    nav button.active { background: #2563eb; color: white; }
    nav button:hover { background: #ffffff12; }
    .logout { margin-top: auto; background: #ffffff10; color: #fecaca; border: 1px solid #ffffff18; }
    main { min-width: 0; padding: 24px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin: -24px -24px 20px;
      padding: 20px 24px;
      background: #ffffffcc;
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 3;
    }
    .top-actions { position: relative; display: flex; align-items: center; gap: 10px; }
    .top-menu-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      color: var(--navy);
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
    }
    .top-menu {
      position: absolute;
      right: 0;
      top: 48px;
      z-index: 30;
      width: 190px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      box-shadow: 0 18px 42px #11182722;
    }
    .top-menu button {
      min-height: 42px;
      border: 0;
      border-radius: 12px;
      background: #fff1f2;
      color: var(--red);
      font-weight: 600;
      text-align: left;
      padding: 0 12px;
    }
    .topbar h1 { font-size: 24px; line-height: 32px; font-weight: 700; color: var(--ink); }
    .topbar p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 20px; font-weight: 500; }
    .chip { border: 1px solid var(--line); border-radius: 8px; background: white; padding: 10px 12px; font-size: 13px; font-weight: 600; }
    .kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .card, .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      box-shadow: var(--shadow);
    }
    .card { padding: 16px; min-height: 104px; }
    .card span { display: block; color: var(--muted); font-size: 12px; line-height: 18px; font-weight: 600; text-transform: uppercase; }
    .card strong { display: block; margin-top: 10px; font-size: 26px; line-height: 32px; font-weight: 700; }
    .card small { display: block; margin-top: 10px; color: var(--teal); font-size: 12px; line-height: 18px; font-weight: 500; }
    .panel { padding: 18px; margin-bottom: 16px; }
    .panel h2 { margin: 0 0 14px; font-size: 18px; line-height: 26px; font-weight: 700; }
    .panel strong, .table-wrap strong, .list-row strong, .credential-box strong { font-weight: 600; line-height: 1.45; }
    .grid-2 { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(340px, .75fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; align-items: end; }
    .form-grid .wide { grid-column: span 2; }
    .form-grid .full { grid-column: 1 / -1; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .toolbar-left, .row-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { color: var(--muted); font-size: 12px; font-weight: 600; line-height: 18px; text-align: left; background: #f8fafc; border-bottom: 1px solid var(--line); padding: 10px; }
    td { border-bottom: 1px solid var(--line); padding: 11px 10px; vertical-align: top; font-weight: 400; line-height: 20px; }
    tr:last-child td { border-bottom: 0; }
    .table-wrap { overflow: auto; }
    .mobile-canteens { display: none; }
    .canteen-result { display: block; }
    .canteen-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: white;
      box-shadow: 0 10px 26px #1118270d;
    }
    .canteen-card.tone-0 { background: #f2f7ff; border-color: #d7e8ff; }
    .canteen-card.tone-1 { background: #f0fdf4; border-color: #bbf7d0; }
    .canteen-card.tone-2 { background: #fff7ed; border-color: #fed7aa; }
    .canteen-card.tone-3 { background: #f5f3ff; border-color: #ddd6fe; }
    .canteen-card.tone-4 { background: #ecfeff; border-color: #a5f3fc; }
    .canteen-card.tone-5 { background: #fff1f2; border-color: #fecdd3; }
    tr.tone-0 td { background: #f8fbff; }
    tr.tone-1 td { background: #f7fef9; }
    tr.tone-2 td { background: #fffaf5; }
    tr.tone-3 td { background: #fbfaff; }
    .canteen-card-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .canteen-card h3 { font-size: 17px; line-height: 24px; font-weight: 700; }
    .canteen-card .meta { color: var(--muted); font-size: 12px; line-height: 18px; font-weight: 500; }
    .canteen-facts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .fact { padding: 10px; border-radius: 10px; background: #f8fafc; border: 1px solid #eef2f7; }
    .fact span { display: block; color: var(--muted); font-size: 11px; line-height: 16px; font-weight: 600; text-transform: uppercase; }
    .fact strong { display: block; margin-top: 4px; font-size: 14px; line-height: 20px; font-weight: 600; overflow-wrap: anywhere; }
    .credential-box {
      display: grid;
      gap: 8px;
      padding: 12px;
      border-radius: 12px;
      background: #eef6ff;
      border: 1px solid #cfe4ff;
    }
    .credential-box strong { overflow-wrap: anywhere; }
    .employee-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
    .employee-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }
    .employee-card:nth-child(2n) { background: #f7fef9; }
    .employee-card:nth-child(3n) { background: #fffaf5; }
    .employee-card h3 { font-size: 17px; line-height: 24px; font-weight: 700; }
    .employee-card .doc-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pill { display: inline-flex; min-height: 24px; align-items: center; border-radius: 999px; padding: 0 9px; font-size: 12px; line-height: 18px; font-weight: 600; background: #eef4ff; color: var(--blue); }
    .pill.green { background: #ecfdf5; color: var(--green); }
    .pill.orange { background: #fff7ed; color: #c2410c; }
    .pill.red { background: #fff1f2; color: var(--red); }
    .pill.gray { background: #f3f4f6; color: #475467; }
    .list { display: grid; gap: 10px; }
    .list-row { display: flex; justify-content: space-between; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line); }
    .list-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .muted { color: var(--muted); font-weight: 500; }
    .activity { display: grid; gap: 10px; }
    .activity-item { display: grid; grid-template-columns: 10px 1fr; gap: 10px; align-items: start; }
    .activity-item strong { color: var(--ink); font-size: 13px; line-height: 18px; font-weight: 600; }
    .activity-item .muted { font-size: 12px; line-height: 18px; font-weight: 500; }
    .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 5px; background: var(--blue); }
    @media (max-width: 980px) {
      body { background: #f8fafc; }
      .login { padding: 18px; align-items: center; }
      .login-card { padding: 22px; border-radius: 24px; }
      .brand h1 { font-size: 28px; }
      .shell { display: block; min-height: 100vh; }
      aside {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        z-index: 20;
        height: auto;
        min-height: 74px;
        display: block;
        padding: 9px 10px calc(9px + env(safe-area-inset-bottom));
        border-top: 1px solid #ffffff20;
        border-radius: 18px 18px 0 0;
        box-shadow: 0 -16px 34px #0b1f3f24;
      }
      .side-brand, .profile, .logout { display: none; }
      nav {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(74px, 1fr);
        gap: 6px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      nav::-webkit-scrollbar { display: none; }
      nav button {
        min-height: 56px;
        display: grid;
        place-items: center;
        gap: 2px;
        padding: 5px 8px;
        text-align: center;
        color: #cbd7ec;
        white-space: normal;
        font-size: 12px;
        line-height: 1.1;
      }
      .nav-ico { width: 19px; height: 19px; }
      nav button span { display: none; }
      nav button small { display: block; font-size: 12px; line-height: 16px; font-weight: 600; }
      nav button.active { background: #1d4ed8; color: #fff; }
      main { padding: 12px 12px 96px; min-height: 100dvh; }
      .topbar {
        position: sticky;
        top: 0;
        margin: -12px -12px 12px;
        padding: 14px 12px;
        border-radius: 0 0 20px 20px;
        z-index: 10;
      }
      .topbar h1 { font-size: 20px; }
      .topbar p { font-size: 12px; }
      .chip { display: none; }
      .top-menu-btn { display: grid; place-items: center; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
      .grid-2, .grid-3, .form-grid { grid-template-columns: 1fr; }
      .form-grid .wide, .form-grid .full { grid-column: auto; }
      .card { min-height: 88px; padding: 12px; }
      .card strong { font-size: 20px; }
      .card small { margin-top: 6px; }
      .panel { padding: 14px; border-radius: 12px; margin-bottom: 12px; }
      .panel h2 { font-size: 16px; }
      .canteen-result .table-wrap { display: none; }
      .mobile-canteens { display: grid; gap: 10px; }
      .employee-grid { grid-template-columns: 1fr; }
      .employee-card .doc-row { grid-template-columns: 1fr; }
      .canteen-facts { grid-template-columns: 1fr 1fr; }
      .primary, .secondary, .danger, .ghost { min-height: 44px; }
      input, select, textarea { min-height: 44px; }
    }
  </style>
</head>
<body>
  <section class="login" id="loginView">
    <form class="login-card" id="loginForm">
      <div class="brand">
        <h1>axzen Marketing</h1>
        <p>Canteen onboarding and approval console</p>
      </div>
      <label>Employee ID <input id="employeeId" autocomplete="username" value="SUPER" required></label>
      <label>Password <input id="password" type="password" autocomplete="current-password" value="admin123" required></label>
      <button class="primary" type="submit">Login</button>
      <div class="status" id="loginStatus">Super: SUPER / admin123 | Marketing: MKT001 / 1234</div>
    </form>
  </section>

  <section class="shell hidden" id="appView">
    <aside>
      <div class="side-brand"><strong>axzen Console</strong><span>Marketing Operations</span></div>
      <div class="profile"><div class="avatar" id="avatar">A</div><div><strong id="profileName">User</strong><span id="profileRole">Role</span></div></div>
      <nav id="nav"></nav>
      <button class="logout" id="logoutBtn" type="button">Logout</button>
    </aside>
    <main>
      <header class="topbar">
        <div><h1 id="pageTitle">Dashboard</h1><p id="pageSub">Track canteen onboarding, payments and approvals.</p></div>
        <div class="top-actions">
          <div class="chip" id="roleChip">Super Admin</div>
          <button class="top-menu-btn" id="topMenuBtn" type="button" aria-label="More options">⋮</button>
          <div class="top-menu hidden" id="topMenu">
            <button id="topLogoutBtn" type="button">Logout</button>
          </div>
        </div>
      </header>
      <div class="status" id="pageStatus"></div>
      <section id="page"></section>
    </main>
  </section>

  <script>
    const liveApi = "https://canteen.axzen.in";
    const API = window.Capacitor || window.location.protocol === "capacitor:" ? liveApi : "";
    const $ = id => document.getElementById(id);
    const money = value => "Rs " + Number(value || 0).toLocaleString("en-IN");
    const esc = value => String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    const today = () => new Date().toISOString().slice(0, 10);
    const formatDateTime = value => new Date(value || Date.now()).toLocaleString("en-IN", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
    const tokenKey = "AXZEN_MARKETING_TOKEN";
    let token = localStorage.getItem(tokenKey) || "";
    let user = null;
    let tab = "dashboard";
    let state = { canteens: [], users: [], printers: [], activities: [], payments: [], supportTickets: [], summary: { cards: {}, marketingPerformance: [], recentActivities: [] } };

    const superTabs = [
      ["dashboard", "Dashboard"],
      ["approvals", "Approval Queue"],
      ["canteens", "Canteens"],
      ["employees", "Employees"],
      ["payments", "Payments"],
      ["printers", "Printer Inventory"],
      ["performance", "Marketing Performance"],
      ["activities", "Recent Activities"]
    ];
    const marketingTabs = [
      ["dashboard", "My Dashboard"],
      ["add", "Add Canteen"],
      ["my", "My Registrations"],
      ["payments", "Payment Pending"],
      ["performance", "My Performance"]
    ];
    const shortTabs = {
      dashboard: "Home",
      add: "Add",
      my: "Mine",
      payments: "Pay",
      performance: "Stats",
      approvals: "Queue",
      canteens: "Canteens",
      employees: "Team",
      printers: "Printers",
      activities: "Log"
    };

    async function api(path, options = {}) {
      const res = await fetch(API + path, {
        ...options,
        headers: { "Content-Type": "application/json", ...(token ? { Authorization: `Bearer ${token}` } : {}), ...(options.headers || {}) }
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.success === false) throw new Error(data.message || "Request failed");
      return data;
    }
    function status(text, type = "ok") {
      $("pageStatus").textContent = text || "";
      $("pageStatus").className = `status ${type}`;
    }
    function statusClass(value) {
      if (value === "Active") return "green";
      if (value === "Pending Approval" || value === "Trial") return "orange";
      if (value === "Rejected" || value === "Blocked" || value === "Expired") return "red";
      return "gray";
    }
    function setPage(title, sub) {
      $("pageTitle").textContent = title;
      $("pageSub").textContent = sub || "Track canteen onboarding, payments and approvals.";
      document.querySelectorAll("#nav button").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
    }
    function renderNav() {
      const tabs = user.role === "super_admin" ? superTabs : marketingTabs;
      $("nav").innerHTML = tabs.map(([id, label]) => `<button data-tab="${id}" type="button">${navIcon(id)}<span>${label}</span><small>${shortTabs[id] || label}</small></button>`).join("");
      document.querySelectorAll("#nav button").forEach(btn => btn.addEventListener("click", () => {
        tab = btn.dataset.tab;
        status("");
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }));
    }
    function navIcon(id) {
      const icons = {
        dashboard: '<path d="M3 13h8V3H3v10Zm10 8h8V3h-8v18ZM3 21h8v-6H3v6Z"/>',
        approvals: '<path d="M9 12l2 2 4-4"/><path d="M5 4h14v16H5z"/><path d="M8 2h8v4H8z"/>',
        canteens: '<path d="M4 10h16l-2-5H6l-2 5Z"/><path d="M6 10v9h12v-9"/><path d="M9 19v-5h6v5"/>',
        employees: '<path d="M16 11a4 4 0 1 0-8 0"/><path d="M4 20a8 8 0 0 1 16 0"/><path d="M18 8a3 3 0 0 1 3 3"/><path d="M3 11a3 3 0 0 1 3-3"/>',
        payments: '<path d="M3 7h18v12H3z"/><path d="M3 10h18"/><path d="M7 15h4"/>',
        printers: '<path d="M6 9V3h12v6"/><path d="M6 17H4a2 2 0 0 1-2-2v-4h20v4a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/>',
        performance: '<path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/>',
        activities: '<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/><path d="M12 7v5l3 2"/>',
        my: '<path d="M4 10h16l-2-5H6l-2 5Z"/><path d="M6 10v9h12v-9"/>'
      };
      return `<span class="nav-ico" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[id] || icons.dashboard}</svg></span>`;
    }
    async function refresh() {
      const data = await api("/marketing-api/dashboard");
      state = data;
    }

    function actionButtons(item) {
      if (user.role !== "super_admin") return "";

    function bindTableActions() {
      document.querySelectorAll("[data-approve]").forEach(btn => btn.addEventListener("click", () => updateAction(`/marketing-api/canteens/${btn.dataset.approve}/approve`, { status: "Active" }, "Canteen activated. Login ID and default password generated.")));
      document.querySelectorAll("[data-reject]").forEach(btn => btn.addEventListener("click", () => {

        if (reason) updateAction(`/marketing-api/canteens/${btn.dataset.reject}/reject`, { reason }, "Canteen rejected");
      }));
      document.querySelectorAll("[data-block]").forEach(btn => btn.addEventListener("click", () => updateAction(`/marketing-api/canteens/${btn.dataset.block}/block`, { blocked: btn.dataset.blocked === "true" }, "Block status updated")));

        const item = state.canteens.find(row => Number(row.id) === Number(btn.dataset.payment));

        if (paidAmount === null) return;
        const pendingAmount = prompt("Pending amount", item.pendingAmount || 0);

      document.querySelectorAll("[data-printer]").forEach(btn => {

          const item = state.canteens.find(row => Number(row.id) === Number(btn.dataset.printer));

          if (printersAssigned !== null) updateAction(`/marketing-api/canteens/${item.id}/printers`, { printersAssigned }, "Printers updated");
        });
      });
      document.querySelectorAll("[data-plan]").forEach(btn => btn.addEventListener("click", () => {

      }));
    }
    async function updateAction(path, body, message) {

        await refresh();

        render();
      } catch (error) {
        status(error.message || "Update failed", "error");
      }

    function syncPrinterRequired() {

      if ($("printerSerialNumber")) $("printerSerialNumber").required = required;

    async function submitCanteen(event) {
      event.preventDefault();
      const submitButton = event.submitter;
      const fields = ["canteenName", "ownerName", "ownerMobile", "alternateMobile", "address", "city", "state", "counters", "printersRequired", "printerModel", "printerSerialNumber", "selectedPlan", "planType", "planStartDate", "planExpiryDate", "paymentMode", "paidAmount", "pendingAmount", "documents", "notes"];
      const body = Object.fromEntries(fields.map(id => [id, $(id).value]));
      try {
        if (submitButton) submitButton.disabled = true;
        status("Submitting canteen for approval...");
        await api("/marketing-api/canteens", { method: "POST", body: JSON.stringify(body) });
        await refresh();
        tab = "my";
        render();
        status("Submitted for Super Admin approval. It is now visible in Approval Queue.");
      } catch (error) {
        status(error.message || "Canteen submission failed", "error");
      } finally {
        if (submitButton) submitButton.disabled = false;
      }
    }

    function render() {
      const titles = {

      else if (tab === "payments") $("page").innerHTML = `<section class="panel"><h2>Pending Payments</h2>${canteensTable(state.canteens.filter(item => Number(item.pendingAmount || 0) > 0), user.role === "super_admin")}</section><section class="panel"><h2>Payment History</h2>${paymentsTable(state.payments || [])}</section>`;
      else if (tab === "printers") { $("page").innerHTML = printerInventoryHtml(); bindPrinterInventory(); return; }
      else if (tab === "performance") $("page").innerHTML = `<section class="panel"><h2>Marketing Performance</h2>${performanceTable(state.summary.marketingPerformance)}</section>`;
      else if (tab === "activities") $("page").innerHTML = `<section class="panel"><h2>Recent Activities</h2>${activitiesHtml(60)}</section>`;
      bindTableActions();
      if ($("searchBox")) $("searchBox").addEventListener("input", event => {
        const q = event.target.value.toLowerCase();
        const category = $("searchCategory")?.value || "all";
        const filtered = state.canteens.filter(item => {
          const hay = category === "all" ? `${item.canteenName} ${item.ownerName} ${item.city} ${item.status}` : String(item[category] || "");
          return hay.toLowerCase().includes(q);
        });
        $("page").querySelector(".canteen-result").outerHTML = canteensTable(filtered, user.role === "super_admin");
        bindTableActions();
      });
      if ($("searchCategory")) $("searchCategory").addEventListener("change", () => $("searchBox").dispatchEvent(new Event("input")));
    }
    async function enterApp(nextUser) {
      user = nextUser;
      $("loginView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("profileName").textContent = user.name;
      $("profileRole").textContent = user.role === "super_admin" ? "Super Admin" : "Marketing Employee";
      $("roleChip").textContent = $("profileRole").textContent;
      $("avatar").textContent = String(user.name || "A").slice(0, 1).toUpperCase();
      renderNav();
      await refresh();
      render();
    }
    $("loginForm").addEventListener("submit", async event => {
      event.preventDefault();
      $("loginStatus").textContent = "Checking...";
      try {
        const data = await api("/marketing-api/login", { method: "POST", body: JSON.stringify({ employeeId: $("employeeId").value, password: $("password").value }) });
        token = data.token || "";
        if (!token) throw new Error("Login token missing. Please update backend settings and login again.");
        if (token) localStorage.setItem(tokenKey, token);
        await enterApp(data.user);
      } catch (error) {
        $("loginStatus").textContent = error.message || "Login failed";
        $("loginStatus").className = "status error";
      }
    });
    function logoutMarketing() {
      token = "";
      user = null;
      localStorage.removeItem(tokenKey);
      $("topMenu").classList.add("hidden");
      $("appView").classList.add("hidden");
      $("loginView").classList.remove("hidden");
    }
    $("logoutBtn").addEventListener("click", logoutMarketing);
    $("topLogoutBtn").addEventListener("click", logoutMarketing);
    $("topMenuBtn").addEventListener("click", event => {
      event.stopPropagation();
      $("topMenu").classList.toggle("hidden");
    });
    document.addEventListener("click", event => {
      if (!$("topMenu").contains(event.target) && event.target !== $("topMenuBtn")) {
        $("topMenu").classList.add("hidden");
      }
    });
    (async function boot() {
      if (!token) return;
      try {
        const data = await api("/marketing-api/me");
        await enterApp(data.user);
      } catch {
        localStorage.removeItem(tokenKey);
      }
    })();
  </script>
</body>
</html>
